<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>fake</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: white; overflow: hidden;
        }
        /* Video ẩn siêu nhỏ */
        #trollVideo {
            position: absolute; width: 1px; height: 1px; opacity: 0;
        }
    </style>
</head>
<body>

    <video id="trollVideo" loop playsinline>
        <source src="fakesound.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('trollVideo');

        // Cố gắng phát tự động (thường sẽ thất bại ở lần đầu)
        video.play().catch(() => {
            console.log("Trình duyệt chặn. Chờ người dùng chạm vào màn hình...");
        });

        // Bắt bất kỳ hành động nào của người dùng để kích hoạt âm thanh
        const enableSound = () => {
            video.play();
            // Gỡ bỏ các sự kiện sau khi đã phát thành công
            ["click", "touchstart", "keydown", "scroll"].forEach(event => {
                document.removeEventListener(event, enableSound);
            });
        };

        // Lắng nghe mọi hành động: Click, Chạm, Nhấn phím, Cuộn chuột
        ["click", "touchstart", "keydown", "scroll"].forEach(event => {
            document.addEventListener(event, enableSound);
        });
    </script>
</body>
</html>
