<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web trắng</title>
    <style>
        /* Đảm bảo toàn bộ màn hình trắng tinh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden; /* Không cho cuộn trang */
            cursor: default;
        }
        /* Ẩn hoàn toàn video khỏi tầm mắt */
        #tiktokVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }
    </style>
</head>
<body>

    <video id="tiktokVideo" loop playsinline>
        <source src="ten_file_video_cua_ban.mp4" type="video/mp4">
    </video>

    <script>
        // Hàm bắt đầu phát nhạc khi người dùng tương tác
        function startTroll() {
            const video = document.getElementById('tiktokVideo');
            video.play().catch(error => {
                console.log("Trình duyệt chặn phát tự động, cần click mạnh hơn!");
            });
            
            // Sau khi bấm xong thì gỡ sự kiện để tránh bấm lại nhiều lần
            document.removeEventListener('click', startTroll);
            document.removeEventListener('touchstart', startTroll);
        }

        // Lắng nghe cả cú click chuột và chạm màn hình (điện thoại)
        document.addEventListener('click', startTroll);
        document.addEventListener('touchstart', startTroll);
    </script>

</body>
</html>
