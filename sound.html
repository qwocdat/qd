<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Screen</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: white; overflow: hidden;
            cursor: default;
        }
        /* Ẩn video hoàn toàn */
        #trollVideo {
            position: absolute; width: 1px; height: 1px; opacity: 0;
        }
    </style>
</head>
<body>

    <video id="trollVideo" loop playsinline>
        <source src="https://raw.githubusercontent.com/qwocdat/qd/main/fakesound.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('trollVideo');

        // Hàm kích hoạt nhạc
        const startSound = () => {
            video.play().then(() => {
                console.log("Đang phát...");
                // Gỡ sự kiện sau khi đã phát thành công để tránh tốn tài nguyên
                ["click", "touchstart", "scroll", "keydown"].forEach(e => {
                    document.removeEventListener(e, startSound);
                });
            }).catch(err => console.log("Đang đợi tương tác..."));
        };

        // Lắng nghe mọi hành động nhỏ nhất của người dùng
        ["click", "touchstart", "scroll", "keydown"].forEach(e => {
            document.addEventListener(e, startSound);
        });
    </script>
</body>
</html>
