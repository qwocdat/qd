<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDATDV</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .brand { font-family: 'Orbitron'; font-size: 32px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5); text-align: center; }
        .brand span { color: var(--primary); }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; max-width: 800px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); color: #888; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 13px; transition: 0.3s; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 136, 0.05); }

        /* Container Sections */
        .content-section { width: 100%; max-width: 800px; display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Auth Card */
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; margin-bottom: 30px; }
        .auth-title { font-family: 'Orbitron'; text-align: center; margin-bottom: 20px; color: var(--accent); font-size: 16px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #666; margin-bottom: 5px; font-family: 'Orbitron'; }
        .input-group input, .input-group select { width: 100%; background: #0b0b0f; color: #fff; border: 1px solid var(--border); padding: 14px; border-radius: 10px; outline: none; }
        .input-group input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-primary { background: var(--primary); color: #000; }

        /* Store & Product */
        .store-title { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 18px; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .product-card i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }
        .price { color: #f1c40f; font-weight: bold; display: block; margin-bottom: 15px; }

        .locked { filter: blur(10px); pointer-events: none; opacity: 0.5; }
        
        /* iOS Popups */
        .ios-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); }
        .ios-box { background: #1c1c1e; width: 280px; border-radius: 14px; text-align: center; overflow: hidden; border: 0.5px solid #333; }
        .ios-content { padding: 20px; }
        .ios-footer { display: flex; border-top: 0.5px solid #333; }
        .ios-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #007aff; font-size: 16px; cursor: pointer; }
        .ios-btn.cancel { color: #ff3b30; border-right: 0.5px solid #333; }
    </style>
</head>
<body>

    <div class="brand">QUOCDAT<span>DV</span></div>

    <div class="auth-card">
        <div id="auth-box">
            <h3 class="auth-title">IDENTIFICATION REQUIRED</h3>
            <div class="input-group"><input type="email" id="email" placeholder="Email Address"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
            <button class="btn btn-primary" onclick="login()">VÀO HỆ THỐNG 🚀</button>
        </div>
        
        <div id="user-box" style="display:none; text-align:center;">
            <p id="user-display" style="color:var(--primary); font-family: 'Orbitron'; margin-bottom:5px;"></p>
            <p id="balance-display" style="color:#f1c40f; margin-bottom:15px; font-size: 22px; font-family: 'Orbitron';">0 VNĐ</p>
            <button class="btn" style="background:#222; color:#fff; font-size: 10px;" onclick="logout()">LOGOUT System</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('store')"><i class="fas fa-shopping-cart"></i> MUA KEY</button>
        <button class="tab-btn" onclick="switchTab('recharge')"><i class="fas fa-wallet"></i> NẠP THẺ</button>
    </div>

    <div id="store-section" class="content-section active">
        <div class="store-title"><i class="fas fa-key"></i> VIP PRODUCTS</div>
        <div id="product-list" class="product-grid locked">
            </div>
    </div>

    <div id="recharge-section" class="content-section">
        <div class="store-title"><i class="fas fa-bolt"></i> AUTO RECHARGE</div>
        <div class="auth-card" style="max-width: 100%; margin: 0 auto;">
            <div class="input-group">
                <label>LOẠI THẺ</label>
                <select id="card_telco">
                    <option value="VIETTEL">Viettel</option>
                    <option value="VINAPHONE">Vinaphone</option>
                    <option value="MOBIFONE">Mobifone</option>
                    <option value="ZING">Zing</option>
                </select>
            </div>
            <div class="input-group">
                <label>MỆNH GIÁ</label>
                <select id="card_amount">
                    <option value="10000">10,000đ</option>
                    <option value="20000">20,000đ</option>
                    <option value="50000">50,000đ</option>
                    <option value="100000">100,000đ</option>
                    <option value="200000">200,000đ</option>
                    <option value="500000">500,000đ</option>
                </select>
            </div>
            <div class="input-group">
                <label>SỐ SERI</label>
                <input type="text" id="card_serial" placeholder="Nhập số seri thẻ">
            </div>
            <div class="input-group">
                <label>MÃ THẺ</label>
                <input type="text" id="card_code" placeholder="Nhập mã bí mật">
            </div>
            <button class="btn btn-primary" id="btn-recharge" onclick="submitRecharge()">XÁC NHẬN NẠP THẺ</button>
            <p style="font-size: 10px; color: #555; margin-top: 15px; text-align: center;">Hệ thống tự động duyệt từ 30s - 2p. Vui lòng không thoát trang.</p>
        </div>
    </div>

    <div id="ios-alert" class="ios-overlay">
        <div class="ios-box">
            <div class="ios-content"><b id="ios-title">Thông báo</b><p id="ios-msg" style="margin-top:10px; color:#ccc; font-size:14px;"></p></div>
            <div class="ios-footer"><button class="ios-btn" onclick="closeAlert()">Đóng</button></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PARTNER_ID = "3368726510"; // THAY BẰNG ID CỦA BẠN
        const PARTNER_KEY = "3682947265104826501"; // THAY BẰNG KEY CỦA BẠN
        
        const conf = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let userBalance = 0;

        // Init App
        function init() {
            const user = localStorage.getItem('logged_user');
            
            // Load Products
            db.ref('products').on('value', snap => {
                const list = document.getElementById('product-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.val();
                    list.innerHTML += `
                        <div class="product-card">
                            <i class="fas fa-fingerprint"></i>
                            <h3>${p.name}</h3>
                            <span class="price">${p.price.toLocaleString()}đ</span>
                            <button class="btn" style="background:rgba(0,255,136,0.1); color:var(--primary); border:1px solid var(--primary); font-size:12px;" onclick="buyProduct('${doc.key}', ${p.price}, '${p.name}')">MUA KEY</button>
                        </div>
                    `;
                });
            });

            if(user) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('user-box').style.display = 'block';
                document.getElementById('user-display').innerText = user;
                document.getElementById('product-list').classList.remove('locked');
                
                let id = user.replace(/[.#$\[\]]/g, '_');
                db.ref('users/' + id + '/balance').on('value', s => {
                    userBalance = s.val() || 0;
                    document.getElementById('balance-display').innerText = userBalance.toLocaleString() + " VNĐ";
                });
            }
        }
        init();

        // GACHTHEFAST LOGIC
        async function submitRecharge() {
            const user = localStorage.getItem('logged_user');
            if(!user) return showAlert("Vui lòng đăng nhập để nạp thẻ!");

            const telco = document.getElementById('card_telco').value;
            const amount = document.getElementById('card_amount').value;
            const serial = document.getElementById('card_serial').value.trim();
            const code = document.getElementById('card_code').value.trim();
            const btn = document.getElementById('btn-recharge');

            if(!serial || !code) return showAlert("Vui lòng nhập đầy đủ thông tin thẻ!");

            btn.disabled = true;
            btn.innerText = "ĐANG GỬI...";

            const id = user.replace(/[.#$\[\]]/g, '_');
            const requestId = id + '_' + Date.now();
            const sign = CryptoJS.MD5(PARTNER_KEY + code + serial).toString();

            const url = `https://gachthefast.com/chargingws/v2?sign=${sign}&telco=${telco}&code=${code}&serial=${serial}&amount=${amount}&request_id=${requestId}&partner_id=${PARTNER_ID}&command=charging`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if(data.status == 99 || data.status == 1) {
                    showAlert("✅ Đã gửi thẻ thành công! Tiền sẽ tự động cộng sau khi hệ thống xác thực.");
                } else {
                    showAlert("❌ Lỗi: " + data.message);
                }
            } catch (e) {
                showAlert("⚠️ Lỗi kết nối API. Hãy thử lại sau.");
            } finally {
                btn.disabled = false;
                btn.innerText = "XÁC NHẬN NẠP THẺ";
            }
        }

        // Tab Switcher
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if(type === 'store') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('store-section').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('recharge-section').classList.add('active');
            }
        }

        // Auth & Buy (Kế thừa từ code của bạn)
        async function login() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return showAlert("Nhập đủ Email và Pass!");
            let id = email.replace(/[.#$\[\]]/g, '_');
            const check = await db.ref('users/' + id).once('value');
            if(!check.exists()) {
                await db.ref('users/' + id).set({ email, password: pass, balance: 0 });
            } else if(check.val().password !== pass) return showAlert("Sai mật khẩu!");
            localStorage.setItem('logged_user', email);
            location.reload();
        }

        function buyProduct(pId, price, name) {
            if(userBalance < price) return showAlert("Số dư không đủ!");
            if(confirm(`Xác nhận mua ${name}?`)) executePurchase(pId, price);
        }

        async function executePurchase(pId, price) {
            const id = localStorage.getItem('logged_user').replace(/[.#$\[\]]/g, '_');
            await db.ref('users/' + id).update({ balance: userBalance - price });
            const p = await db.ref('products/' + pId).once('value');
            showAlert("✅ Thành công! Key: " + (p.val().download_link || "Liên hệ Admin"));
        }

        function showAlert(msg) {
            document.getElementById('ios-msg').innerHTML = msg;
            document.getElementById('ios-alert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }
        function logout() { localStorage.removeItem('logged_user'); location.reload(); }
    </script>
</body>
</html>
