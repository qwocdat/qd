<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDATDV </title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .brand { font-family: 'Orbitron'; font-size: 28px; margin-bottom: 30px; text-shadow: 0 0 15px var(--primary); }
        .brand span { color: var(--primary); }

        /* Giao diện chính */
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 14px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; background: var(--primary); color: #000; }

        /* POPUP KIỂU iOS */
        #ios-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .ios-box {
            background: rgba(30, 30, 35, 0.9); width: 270px; border-radius: 15px;
            text-align: center; overflow: hidden; animation: zoomIn 0.2s ease-out;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        @keyframes zoomIn { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .ios-content { padding: 20px; }
        .ios-title { font-weight: 600; font-size: 17px; margin-bottom: 5px; }
        .ios-msg { font-size: 13px; color: #ccc; }
        .ios-btn {
            width: 100%; padding: 12px; background: transparent; border: none;
            border-top: 0.5px solid rgba(255,255,255,0.2); color: #007aff;
            font-size: 17px; font-weight: 600; cursor: pointer;
        }

        /* Kho Hàng */
        .store { margin-top: 30px; width: 100%; max-width: 600px; background: var(--card); border-radius: 24px; padding: 20px; position: relative; }
        .locked { filter: blur(15px); pointer-events: none; }
        .lock-txt { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div class="brand">QUOCDAT<span>DV</span></div>

    <div class="auth-card">
        <div id="login-form">
            <div class="input-group"><input type="email" id="email" placeholder="Email nhận mã"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
            <button class="btn" onclick="sendOTP()">GỬI MÃ OTP 📩</button>
        </div>
        <div id="otp-form" style="display:none;">
            <div class="input-group"><input type="text" id="otp_input" placeholder="Nhập 6 số từ Email"></div>
            <button class="btn" onclick="verifyOTP()">XÁC NHẬN ✅</button>
        </div>
        <div id="user-info" style="display:none; text-align:center;">
            <p id="u-mail" style="color:var(--primary); margin-bottom:10px;"></p>
            <button class="btn" style="background:#ff4757; color:#fff;" onclick="logout()">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div class="store">
        <div id="lock-msg" class="lock-txt"><i class="fas fa-lock"></i><br>LOGIN TO UNLOCK</div>
        <div id="items" class="locked" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div style="background:#000; padding:15px; border-radius:15px; text-align:center;">VIP 1<br><span style="color:gold">10k</span></div>
            <div style="background:#000; padding:15px; border-radius:15px; text-align:center;">VIP 2<br><span style="color:gold">50k</span></div>
        </div>
    </div>

    <div id="ios-alert">
        <div class="ios-box">
            <div class="ios-content">
                <div class="ios-title">Thông báo</div>
                <div class="ios-msg">Mã OTP đã được gửi đến Email của bạn. Vui lòng kiểm tra!</div>
            </div>
            <button class="ios-btn" onclick="closeAlert()">Đồng ý</button>
        </div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        });
        const db = firebase.database();
        emailjs.init("G7LvD9Rr0y1bZ7eZj");

        let currentOTP = "";

        if(localStorage.getItem('user')) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('u-mail').innerText = localStorage.getItem('user');
            document.getElementById('lock-msg').style.display = 'none';
            document.getElementById('items').classList.remove('locked');
        }

        function showAlert() { document.getElementById('ios-alert').style.display = 'flex'; }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }

        function sendOTP() {
            const email = document.getElementById('email').value.trim();
            if(!email.includes('@')) return alert("Sai Email!");

            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();

            // otp_code là MÃ SỐ, passcode là THỜI GIAN
            const data = { to_email: email, otp_code: currentOTP, passcode: "10 Phút" };

            emailjs.send('quocdatdvmod', 'template_r65u5mk', data)
                .then(() => {
                    showAlert(); // Hiện thông báo iOS
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('otp-form').style.display = 'block';
                }).catch(e => alert("Lỗi gửi mail!"));
        }

        async function verifyOTP() {
            const input = document.getElementById('otp_input').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(input === currentOTP && input !== "") {
                let id = email.replace(/[.#$\[\]]/g, '_');
                await db.ref('users/' + id).set({ email, pass });
                localStorage.setItem('user', email);
                location.reload();
            } else {
                alert("Mã OTP không đúng!");
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
        </html>
