<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDATDV</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .brand { font-family: 'Orbitron'; font-size: 28px; margin-bottom: 25px; text-shadow: 0 0 15px var(--primary); }
        .brand span { color: var(--primary); }

        /* Auth Card */
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; margin-bottom: 30px; }
        .input-group { margin-bottom: 12px; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 10px; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #000; }

        /* Store Section */
        .store-container { width: 100%; max-width: 800px; }
        .store-title { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .product-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 18px; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-card i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }
        .product-card h3 { font-size: 16px; margin-bottom: 5px; }
        .product-card .price { color: #f1c40f; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-buy { background: rgba(0, 255, 136, 0.1); color: var(--primary); border: 1px solid var(--primary); font-size: 12px; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; }
        .btn-buy:hover { background: var(--primary); color: #000; }

        .locked { filter: blur(10px); pointer-events: none; opacity: 0.5; }

        /* POPUP iOS CHUNG */
        .ios-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .ios-box { background: rgba(30, 30, 35, 0.95); width: 280px; border-radius: 14px; text-align: center; border: 0.5px solid #444; overflow: hidden; animation: iosPop 0.2s ease-out; }
        @keyframes iosPop { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .ios-content { padding: 20px; }
        .ios-content b { font-size: 17px; color: #fff; }
        .ios-content p { font-size: 13px; color: #ccc; margin-top: 5px; }
        .ios-footer { display: flex; border-top: 0.5px solid #444; }
        .ios-btn { flex: 1; padding: 12px; background: transparent; border: none; font-size: 17px; cursor: pointer; color: #007aff; }
        .ios-btn.cancel { color: #ff3b30; border-right: 0.5px solid #444; }
        .ios-btn.confirm { font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand">QUOCDAT<span>DV</span></div>

    <div class="auth-card">
        <div id="auth-box">
            <div id="login-step">
                <div class="input-group"><input type="email" id="email" placeholder="Email nhận mã"></div>
                <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
                <button class="btn btn-primary" onclick="sendOTP()">NHẬN MÃ OTP 📩</button>
            </div>
            <div id="otp-step" style="display:none;">
                <div class="input-group"><input type="text" id="otp_input" placeholder="Nhập 6 số từ Email"></div>
                <button class="btn btn-primary" onclick="verifyOTP()">XÁC NHẬN ✅</button>
            </div>
        </div>
        <div id="user-box" style="display:none; text-align:center;">
            <p id="user-display" style="color:var(--accent); margin-bottom:10px; font-weight:bold;"></p>
            <p id="balance-display" style="color:#f1c40f; margin-bottom:15px; font-size: 18px;">Số dư: 0đ</p>
            <button class="btn" style="background:#ff4757; color:#fff" onclick="logout()">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div class="store-container">
        <div class="store-title"><i class="fas fa-shopping-cart"></i> KHO SẢN PHẨM VIP</div>
        <div id="product-list" class="product-grid locked"></div>
    </div>

    <div id="ios-alert" class="ios-overlay">
        <div class="ios-box">
            <div class="ios-content">
                <b>Thông báo</b>
                <p id="ios-msg"></p>
            </div>
            <div class="ios-footer">
                <button class="ios-btn" onclick="closeAlert()">Đồng ý</button>
            </div>
        </div>
    </div>

    <div id="ios-buy-confirm" class="ios-overlay">
        <div class="ios-box">
            <div class="ios-content">
                <b>Xác nhận mua</b>
                <p id="buy-msg"></p>
            </div>
            <div class="ios-footer">
                <button class="ios-btn cancel" onclick="closeBuyPopup()">Hủy</button>
                <button class="ios-btn confirm" id="confirm-buy-btn">Mua ngay</button>
            </div>
        </div>
    </div>

    <script>
        const conf = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();
        emailjs.init("G7LvD9Rr0y1bZ7eZj");

        let currentOTP = "";
        let userBalance = 0;

        function init() {
            const user = localStorage.getItem('logged_user');
            
            // Load sản phẩm từ Admin
            db.ref('products').on('value', snap => {
                const list = document.getElementById('product-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.val();
                    list.innerHTML += `
                        <div class="product-card">
                            <i class="fas fa-gem"></i>
                            <h3>${p.name}</h3>
                            <span class="price">${p.price.toLocaleString()} VNĐ</span>
                            <button class="btn-buy" onclick="buyProduct('${doc.key}', ${p.price}, '${p.name}')">MUA NGAY</button>
                        </div>
                    `;
                });
            });

            if(user) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('user-box').style.display = 'block';
                document.getElementById('user-display').innerText = "User: " + user;
                document.getElementById('product-list').classList.remove('locked');
                
                let id = user.replace(/[.#$\[\]]/g, '_');
                db.ref('users/' + id + '/balance').on('value', s => {
                    userBalance = s.val() || 0;
                    document.getElementById('balance-display').innerText = "Số dư: " + userBalance.toLocaleString() + "đ";
                });
            }
        }
        init();

        // OTP Logic
        function sendOTP() {
            const email = document.getElementById('email').value.trim();
            if(!email.includes('@')) return showAlert("Email không hợp lệ!");
            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            emailjs.send('quocdatdvmod', 'template_r65u5mk', {
                to_email: email,
                otp_code: currentOTP,
                passcode: "10 Phút"
            }).then(() => {
                showAlert("Mã OTP đã được gửi tới Email của bạn!");
                document.getElementById('login-step').style.display = 'none';
                document.getElementById('otp-step').style.display = 'block';
            });
        }

        async function verifyOTP() {
            const code = document.getElementById('otp_input').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(code === currentOTP) {
                let id = email.replace(/[.#$\[\]]/g, '_');
                const check = await db.ref('users/' + id).once('value');
                if(!check.exists()) await db.ref('users/' + id).set({ email, password: pass, balance: 0 });
                localStorage.setItem('logged_user', email);
                location.reload();
            } else { showAlert("Mã xác nhận không chính xác!"); }
        }

        // MUA HÀNG LOGIC (iOS STYLE)
        function buyProduct(pId, price, name) {
            if (userBalance < price) {
                return showAlert(`Bạn không đủ tiền!<br>Cần nạp thêm: ${(price - userBalance).toLocaleString()}đ`);
            }

            document.getElementById('buy-msg').innerHTML = `Mua <b>${name}</b> với giá <span style="color:#f1c40f">${price.toLocaleString()}đ</span>?`;
            document.getElementById('ios-buy-confirm').style.display = 'flex';

            document.getElementById('confirm-buy-btn').onclick = () => executePurchase(pId, price);
        }

        async function executePurchase(pId, price) {
            closeBuyPopup();
            const email = localStorage.getItem('logged_user');
            let id = email.replace(/[.#$\[\]]/g, '_');
            const newBalance = userBalance - price;

            try {
                await db.ref('users/' + id).update({ balance: newBalance });
                const pSnap = await db.ref('products/' + pId).once('value');
                const link = pSnap.val().download_link;

                showAlert("✅ Mua thành công! Đang lấy link...");
                if (link) setTimeout(() => window.open(link, '_blank'), 1500);
            } catch (e) { showAlert("Lỗi: " + e.message); }
        }

        // Helper functions
        function showAlert(msg) {
            document.getElementById('ios-msg').innerHTML = msg;
            document.getElementById('ios-alert').style.display = 'flex';
        }
        function closeAlert() { document.getElementById('ios-alert').style.display = 'none'; }
        function closeBuyPopup() { document.getElementById('ios-buy-confirm').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
