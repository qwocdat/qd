<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDATDV</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --green: #00ff41; --dark: #050505; --card: #0a0a0a; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Fira Code', monospace; }
        body { background: var(--dark); color: var(--green); overflow-x: hidden; padding: 15px; }

        /* Hiệu ứng Matrix */
        .brand { font-family: 'Orbitron'; font-size: 28px; text-align: center; margin: 20px 0; text-shadow: 0 0 10px var(--green); }
        .brand span { color: #fff; }

        /* Container chính */
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        
        /* Form & Input */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: var(--green); padding: 12px; border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--green); box-shadow: 0 0 8px var(--green); }
        
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; margin-top: 10px; }
        .btn-green { background: var(--green); color: #000; }
        .btn-green:active { transform: scale(0.98); }

        /* Tabs nạp tiền / Mua hàng */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #111; border: 1px solid var(--border); color: #555; font-size: 12px; border-radius: 6px; }
        .tab-btn.active { border-color: var(--green); color: var(--green); background: rgba(0,255,65,0.05); }

        /* Thông tin User */
        #user-info { text-align: center; }
        .balance { font-size: 24px; color: #f1c40f; margin: 10px 0; font-weight: bold; }
        
        /* iOS Popup */
        .ios-alert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
        .ios-box { background: #1c1c1e; width: 270px; border-radius: 14px; text-align: center; border: 1px solid #333; overflow: hidden; }
        .ios-text { padding: 20px; color: #fff; font-size: 14px; }
        .ios-btn { padding: 12px; background: transparent; border: none; color: #007aff; width: 100%; border-top: 1px solid #333; font-size: 16px; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">QUOCDAT<span>DV</span></div>

        <div id="login-form" class="glass-card">
            <h3 style="text-align: center; margin-bottom: 15px; font-size: 14px;">[ ACCESS_REQUIRED ]</h3>
            <div class="input-group"><input type="email" id="email" placeholder="Email đăng nhập"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
            <button class="btn btn-green" onclick="handleAuth()">XÁC NHẬN TRUY CẬP</button>
        </div>

        <div id="dashboard" class="hidden">
            <div class="glass-card" id="user-info">
                <p id="user-email" style="font-size: 12px; opacity: 0.6;"></p>
                <div class="balance" id="user-balance">0đ</div>
                <button onclick="logout()" style="background: transparent; border: 1px solid #ff3b30; color: #ff3b30; padding: 4px 10px; font-size: 9px; border-radius: 4px;">ĐĂNG XUẤT</button>
            </div>

            <div class="tabs">
                <button id="tab-nap" class="tab-btn active" onclick="switchTab('nap')">NẠP THẺ</button>
                <button id="tab-key" class="tab-btn" onclick="switchTab('key')">MUA KEY</button>
            </div>

            <div id="section-nap" class="glass-card">
                <div class="input-group"><label>NHÀ MẠNG</label><select id="telco"><option value="VIETTEL">Viettel</option><option value="VINAPHONE">Vinaphone</option><option value="MOBIFONE">Mobifone</option></select></div>
                <div class="input-group"><label>MỆNH GIÁ</label><select id="amount"><option value="10000">10,000</option><option value="20000">20,000</option><option value="50000">50,000</option><option value="100000">100,000</option></select></div>
                <div class="input-group"><label>SỐ SERIAL</label><input type="text" id="serial" placeholder="..."></div>
                <div class="input-group"><label>MÃ THẺ</label><input type="text" id="pin" placeholder="..."></div>
                <button class="btn btn-green" id="btn-submit-nap" onclick="sendCard()">GỬI THẺ NGAY</button>
            </div>

            <div id="section-key" class="glass-card hidden">
                <p style="text-align: center; font-size: 12px;">Đang cập nhật danh sách Key...</p>
            </div>
        </div>
    </div>

    <div id="popup" class="ios-alert"><div class="ios-box"><div class="ios-text" id="popup-msg"></div><button class="ios-btn" onclick="closePopup()">Đóng</button></div></div>

    <script>
        // --- CẤU HÌNH ---
        const PARTNER_ID = "3160359786"; 
        const PARTNER_KEY = "6de754692207c9262c5317b28d39cf05";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- AUTH LOGIC ---
        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return showMsg("Vui lòng điền đủ email và mật khẩu!");

            let userId = email.replace(/[.#$\[\]]/g, '_');
            const snap = await db.ref('users/' + userId).once('value');
            
            if(!snap.exists()) {
                await db.ref('users/' + userId).set({ email: email, password: pass, balance: 0 });
            } else if(snap.val().password !== pass) {
                return showMsg("Mật khẩu không chính xác!");
            }
            
            localStorage.setItem('currentUser', email);
            location.reload();
        }

        // --- INIT DATA ---
        const user = localStorage.getItem('currentUser');
        if(user) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-email').innerText = user;
            
            let userId = user.replace(/[.#$\[\]]/g, '_');
            db.ref('users/' + userId + '/balance').on('value', s => {
                document.getElementById('user-balance').innerText = (s.val() || 0).toLocaleString() + "đ";
            });
        }

        // --- NẠP THẺ LOGIC ---
        async function sendCard() {
            const telco = document.getElementById('telco').value;
            const amount = document.getElementById('amount').value;
            const serial = document.getElementById('serial').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const btn = document.getElementById('btn-submit-nap');

            if(!serial || !pin) return showMsg("Bạn chưa nhập Serial hoặc Mã thẻ!");

            btn.disabled = true;
            btn.innerText = "ĐANG GỬI...";

            const userId = user.replace(/[.#$\[\]]/g, '_');
            const requestId = userId + "_" + Math.floor(Math.random() * 999999);
            const sign = CryptoJS.MD5(PARTNER_KEY + pin + serial).toString();
            
            const url = `https://gachthefast.com/chargingws/v2?sign=${sign}&telco=${telco}&code=${pin}&serial=${serial}&amount=${amount}&request_id=${requestId}&partner_id=${PARTNER_ID}&command=charging`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.status == 99 || data.status == 1) {
                    showMsg("✅ Gửi thẻ thành công! Hệ thống đang kiểm tra.");
                } else {
                    showMsg("❌ Lỗi: " + data.message);
                }
            } catch(e) {
                showMsg("⚠️ Lỗi kết nối server GachTheFast!");
            } finally {
                btn.disabled = false;
                btn.innerText = "GỬI THẺ NGAY";
            }
        }

        // --- UI UTILS ---
        function switchTab(type) {
            document.getElementById('tab-nap').classList.toggle('active', type === 'nap');
            document.getElementById('tab-key').classList.toggle('active', type === 'key');
            document.getElementById('section-nap').classList.toggle('hidden', type !== 'nap');
            document.getElementById('section-key').classList.toggle('hidden', type !== 'key');
        }

        function showMsg(msg) { document.getElementById('popup-msg').innerText = msg; document.getElementById('popup').style.display = 'flex'; }
        function closePopup() { document.getElementById('popup').style.display = 'none'; }
        function logout() { localStorage.removeItem('currentUser'); location.reload(); }
    </script>
</body>
</html>
