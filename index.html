<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUOCDATDV | PREMIUM SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Giao diện Brand */
        .brand { font-family: 'Orbitron'; font-size: 32px; margin-bottom: 30px; text-shadow: 0 0 20px var(--primary); }
        .brand span { color: var(--primary); }

        /* Form Card */
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px 15px 15px 45px; border-radius: 12px; outline: none; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

        /* Buttons */
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #000; margin-top: 10px; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }

        /* Kho Hàng */
        .store-container { margin-top: 40px; width: 100%; max-width: 800px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; position: relative; overflow: hidden; }
        .store-title { font-family: 'Orbitron'; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .product-item { background: #000; border: 1px solid var(--border); padding: 20px; border-radius: 18px; text-align: center; }
        .product-item i { font-size: 30px; color: var(--accent); margin-bottom: 10px; }
        
        /* Hiệu ứng Khóa */
        .locked { filter: blur(15px); pointer-events: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }

        /* User Header */
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="brand">QUOCDAT<span>DV</span></div>

    <div class="auth-card">
        <div id="authForms">
            <div id="loginInputs">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email đăng ký/đăng nhập">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Mật khẩu của bạn">
                </div>
                <button class="btn btn-primary" onclick="sendAuthOTP()">NHẬN MÃ OTP 📨</button>
            </div>

            <div id="otpInputArea" style="display: none;">
                <p style="text-align: center; font-size: 13px; color: var(--primary); margin-bottom: 15px;">Đã gửi mã vào Gmail của bạn!</p>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="otpCode" placeholder="Nhập 6 số từ Email">
                </div>
                <button class="btn btn-primary" onclick="verifyOTP()">XÁC NHẬN VÀ VÀO KHO ✅</button>
            </div>
        </div>

        <div id="userInfo" style="display: none;">
            <div class="user-header">
                <div id="uMail" style="font-weight: 600; color: var(--accent);">user@gmail.com</div>
                <div style="color: #f1c40f;">0 đ</div>
            </div>
            <button class="btn" style="background: #ff4757; color: #fff;" onclick="logout()">ĐĂNG XUẤT 🚪</button>
        </div>
    </div>

    <div class="store-container">
        <div class="store-title"><i class="fas fa-shopping-cart"></i> KHO HÀNG CÔNG TY</div>
        
        <div id="storeLock" class="lock-overlay">
            <i class="fas fa-lock" style="font-size: 40px; color: var(--primary); margin-bottom: 10px;"></i>
            <p style="font-family: 'Orbitron';">VUI LÒNG ĐĂNG NHẬP 🔐</p>
        </div>

        <div id="storeGrid" class="product-grid locked">
            <div class="product-item"><i class="fas fa-bolt"></i><p>GÓI VIP 1</p><p style="color:#f1c40f">10k</p></div>
            <div class="product-item"><i class="fas fa-fire"></i><p>GÓI VIP 2</p><p style="color:#f1c40f">50k</p></div>
            <div class="product-item"><i class="fas fa-crown"></i><p>GÓI VIP 3</p><p style="color:#f1c40f">100k</p></div>
        </div>
    </div>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        });
        const db = firebase.database();
        emailjs.init("G7LvD9Rr0y1bZ7eZj");

        let currentOTP = "";

        function checkStatus() {
            const user = localStorage.getItem('logged_in');
            if(user) {
                document.getElementById('authForms').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('uMail').innerText = user;
                document.getElementById('storeLock').style.display = 'none';
                document.getElementById('storeGrid').classList.remove('locked');
            }
        }
        checkStatus();

        async function sendAuthOTP() {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) return alert("Email không đúng định dạng!");

            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();

            // CHỖ NÀY LÀ QUAN TRỌNG NHẤT: TRUYỀN otp_code LÀ MÃ SỐ
            const params = {
                to_email: email,
                otp_code: currentOTP, // <--- Mã số hiện ở {{otp_code}} (ô to)
                passcode: "15 Phút"    // <--- Thời gian hiện ở {{passcode}} (dòng nhỏ)
            };

            emailjs.send('quocdatdvmod', 'template_r65u5mk', params)
                .then(() => {
                    alert("Gửi mã thành công!");
                    document.getElementById('loginInputs').style.display = 'none';
                    document.getElementById('otpInputArea').style.display = 'block';
                }).catch(e => alert("Lỗi: " + e.text));
        }

        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(code === currentOTP) {
                let safeId = email.replace(/[.#$\[\]]/g, '_');
                await db.ref('users/' + safeId).set({ email, password: pass });
                localStorage.setItem('logged_in', email);
                location.reload();
            } else {
                alert("Mã sai rồi!");
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
    </html>
