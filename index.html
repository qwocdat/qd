<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">TRANG CHỦ | QUOCDAT SEC</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        // Cấu hình mới từ dự án keyquocdat của bạn
        const firebaseConfig = {
          apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
          authDomain: "keyquocdat.firebaseapp.com",
          databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "keyquocdat",
          storageBucket: "keyquocdat.firebasestorage.app",
          messagingSenderId: "940819957535",
          appId: "1:940819957535:web:6e8e9a4c9838740da3122a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const db = firebase.database();
        const auth = firebase.auth();

        // Load code động từ Admin nếu có
        db.ref('raw_code/index_html').once('value', snap => {
            let customCode = snap.val();
            if (customCode && customCode.trim() !== "") { 
                document.open(); document.write(customCode); document.close(); 
            }
        });
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card-bg: #15151e; --border: #2a2a35; --accent: #00b8ff; --vip: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; padding-bottom: 50px; }
        
        .header { background: rgba(0,0,0,0.8); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .brand { font-family: 'Orbitron'; font-size: 20px; font-weight: 900; color: #fff; }
        .brand span { color: var(--primary); }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        .auth-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px 15px 15px 45px; border-radius: 10px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; text-align: center; display: inline-block; width: 100%; text-decoration: none; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        
        .section-title { font-family: 'Orbitron'; font-size: 20px; color: #fff; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; margin-top: 20px;}
        .fixed-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .menu-item { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .menu-item i { font-size: 30px; margin-bottom: 10px; color: var(--accent); }

        .dynamic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .box-card { background: rgba(0,0,0,0.5); border: 1px dashed var(--primary); border-radius: 15px; padding: 25px 20px; text-align: center; text-decoration: none; color: #fff; display: block; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
        .modal-box { width: 90%; max-width: 600px; background: #15151e; border-radius: 15px; border: 1px solid var(--border); }
        .modal-head { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #000; padding: 10px; text-align: left; font-size: 12px; color: #888; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand" id="siteLogo">QUOCDAT<span>.SEC</span></div>
        <div style="font-size: 12px; color: #888;">Hệ Thống Xác Thực Email</div>
    </div>

    <div class="container">
        
        <div class="auth-card" id="loginSection">
            <h2 style="font-family:'Orbitron'; text-align:center; color:var(--primary); margin-bottom:20px;">ĐĂNG NHẬP / ĐĂNG KÝ</h2>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Nhập Email để nhận mã xác nhận">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu (Tối thiểu 6 ký tự)">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="register()">GỬI MÃ & ĐĂNG KÝ</button>
                <button class="btn btn-primary" onclick="login()">ĐĂNG NHẬP</button>
            </div>
            <p id="authMsg" style="color:#ff4757; font-size:13px; text-align:center; margin-top:15px; display:none;"></p>
        </div>

        <div class="auth-card" id="profileSection" style="display:none; border-color: var(--accent);">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <div style="color:#888; font-size:13px;">Xin chào,</div>
                    <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 18px;" id="dispName">Email</h2>
                </div>
                <div style="text-align: right;">
                    <div style="color:#888; font-size:13px;">Số dư</div>
                    <div style="font-family:'Orbitron'; color:var(--vip); font-size: 24px;" id="dispBal">0 đ</div>
                </div>
            </div>
            <button class="btn" style="background: #ff4757; color:#fff; padding: 10px; margin-top: 20px; font-size: 12px;" onclick="logout()">ĐĂNG XUẤT</button>
        </div>

        <div class="section-title">CHỨC NĂNG HỆ THỐNG</div>
        <div class="fixed-menu">
            <a href="#" class="menu-item" onclick="openModal('depositModal')">
                <i class="fas fa-wallet"></i>
                <div style="font-family:'Orbitron'; font-weight:bold;">NẠP TIỀN</div>
            </a>
            <a href="#" class="menu-item" onclick="openHistory()">
                <i class="fas fa-history"></i>
                <div style="font-family:'Orbitron'; font-weight:bold;">LỊCH SỬ</div>
            </a>
        </div>

        <div class="section-title">DANH MỤC MỞ RỘNG</div>
        <div class="dynamic-grid" id="homeGrid">
            <div style="color:#888; font-size:13px;">Đang tải dữ liệu...</div>
        </div>
    </div>

    <div class="modal-overlay" id="depositModal">
        <div class="modal-box">
            <div class="modal-head"><div>NẠP SỐ DƯ</div><i class="fas fa-times" onclick="closeModal('depositModal')"></i></div>
            <div class="modal-body" style="text-align: center; padding: 20px;">
                <div style="background:#000; padding:20px; border-radius:10px; border: 1px dashed var(--accent);">
                    <div style="margin-bottom:10px;">Ngân hàng: <strong>VpBank</strong></div>
                    <div style="margin-bottom:10px;">STK: <strong>0989249990</strong></div>
                    <div style="color:#f1c40f;">Nội dung: <strong id="transferMemo">---</strong></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('vip_username');

        // KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP
        function checkLoginState() {
            if(currentUser) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('dispName').innerText = currentUser;
                document.getElementById('transferMemo').innerText = "NAP " + currentUser.split('@')[0];
                
                let safeUid = currentUser.replace(/[.#$\[\]]/g, '_');
                db.ref('users/' + safeUid).on('value', snap => {
                    let u = snap.val() || {};
                    document.getElementById('dispBal').innerText = Number(u.balance || 0).toLocaleString('vi-VN') + " đ";
                });
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('profileSection').style.display = 'none';
            }
        }
        checkLoginState();

        function showMsg(msg) {
            let m = document.getElementById('authMsg'); m.innerText = msg; m.style.display = 'block';
        }

        // HÀM ĐĂNG KÝ VÀ GỬI EMAIL XÁC NHẬN
        async function register() {
            let email = document.getElementById('email').value.trim();
            let p = document.getElementById('password').value.trim();
            
            if(!email || !email.includes('@')) return showMsg("Vui lòng nhập Email chính xác!");
            if(p.length < 6) return showMsg("Mật khẩu phải từ 6 ký tự!");

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, p);
                await userCredential.user.sendEmailVerification();
                
                let safeUid = email.replace(/[.#$\[\]]/g, '_');
                await db.ref('users/' + safeUid).set({ email: email, balance: 0, banned: false });

                alert("Đăng ký thành công! Một email xác nhận đã được gửi. Hãy nhấn vào link trong email để kích hoạt tài khoản.");
            } catch (error) {
                showMsg(error.message);
            }
        }

        // HÀM ĐĂNG NHẬP (CHỈ CHO PHÉP NẾU ĐÃ XÁC THỰC EMAIL)
        async function login() {
            let email = document.getElementById('email').value.trim();
            let p = document.getElementById('password').value.trim();

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, p);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    showMsg("Bạn chưa xác thực Email! Hãy kiểm tra hộp thư đến.");
                    await auth.signOut();
                    return;
                }

                localStorage.setItem('vip_username', email);
                currentUser = email;
                checkLoginState();
            } catch (error) {
                showMsg("Sai tài khoản hoặc mật khẩu!");
            }
        }

        function logout() { 
            auth.signOut();
            localStorage.removeItem('vip_username'); 
            currentUser = null; 
            checkLoginState(); 
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
