<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDATDV </title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .brand { font-family: 'Orbitron'; font-size: 28px; margin-bottom: 25px; text-shadow: 0 0 15px var(--primary); }
        .brand span { color: var(--primary); }
        .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 12px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; background: var(--primary); color: #000; }
        
        /* Popup iOS */
        #ios-alert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .ios-box { background: rgba(30, 30, 35, 0.95); width: 280px; border-radius: 14px; text-align: center; border: 0.5px solid #444; }
        .ios-content { padding: 20px; }
        .ios-btn { width: 100%; padding: 12px; background: transparent; border: none; border-top: 0.5px solid #444; color: #007aff; font-size: 17px; font-weight: bold; cursor: pointer; }

        .store { margin-top: 25px; width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 20px; position: relative; }
        .locked { filter: blur(12px); pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="brand">QUOCDAT<span>DV</span></div>

    <div class="auth-card">
        <div id="step-login">
            <div class="input-group"><input type="email" id="email" placeholder="Email nhận OTP"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
            <button class="btn" onclick="actionSendOTP()">GỬI MÃ OTP 📩</button>
        </div>

        <div id="step-otp" style="display:none;">
            <div class="input-group"><input type="text" id="otp_input" placeholder="Nhập 6 số từ Email"></div>
            <button class="btn" onclick="actionVerifyOTP()">XÁC NHẬN ✅</button>
        </div>

        <div id="step-done" style="display:none; text-align:center;">
            <p id="txt-user" style="color:var(--primary); margin-bottom:15px;"></p>
            <button class="btn" style="background:#ff4757; color:#fff" onclick="actionLogout()">ĐĂNG XUẤT</button>
        </div>
    </div>

    <div class="store">
        <div id="store-items" class="locked">
            <div style="background:#000; padding:15px; border-radius:10px; text-align:center;">KHO VIP ĐÃ MỞ ✅</div>
        </div>
    </div>

    <div id="ios-alert">
        <div class="ios-box">
            <div class="ios-content">
                <b style="font-size:17px">Thông báo</b><br>
                <p style="font-size:13px; color:#ccc; margin-top:5px">Mã OTP đã được gửi thành công!</p>
            </div>
            <button class="ios-btn" onclick="document.getElementById('ios-alert').style.display='none'">Đồng ý</button>
        </div>
    </div>

    <script>
        // Cấu hình Firebase
        const conf = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(conf);
        const db = firebase.database();
        emailjs.init("G7LvD9Rr0y1bZ7eZj");

        let tempOTP = "";

        // Kiểm tra đã đăng nhập chưa
        if(localStorage.getItem('logged')) {
            showProfile(localStorage.getItem('logged'));
        }

        function showProfile(mail) {
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('step-otp').style.display = 'none';
            document.getElementById('step-done').style.display = 'block';
            document.getElementById('txt-user').innerText = "Chào: " + mail;
            document.getElementById('store-items').classList.remove('locked');
        }

        // Gửi OTP
        function actionSendOTP() {
            const mail = document.getElementById('email').value.trim();
            if(!mail.includes('@')) return alert("Email không hợp lệ!");

            tempOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Gửi dữ liệu: otp_code là mã số
            const emailParams = {
                to_email: mail,
                otp_code: tempOTP, 
                passcode: "10 Phút"
            };

            emailjs.send('quocdatdvmod', 'template_r65u5mk', emailParams)
                .then(() => {
                    document.getElementById('ios-alert').style.display = 'flex';
                    document.getElementById('step-login').style.display = 'none';
                    document.getElementById('step-otp').style.display = 'block';
                }).catch(e => alert("Lỗi EmailJS: " + e.text));
        }

        // Xác nhận OTP (Quan trọng - Đã fix)
        function actionVerifyOTP() {
            const code = document.getElementById('otp_input').value.trim();
            const mail = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(code === "") return alert("Chưa nhập mã!");
            
            if(code === tempOTP) {
                // Lưu vào Firebase ngay lập tức
                let safeId = mail.replace(/[.#$\[\]]/g, '_');
                db.ref('users/' + safeId).set({
                    email: mail,
                    password: pass,
                    status: "Verified"
                }, (error) => {
                    if (error) {
                        alert("Lỗi Firebase (Hãy kiểm tra Rules): " + error.message);
                    } else {
                        localStorage.setItem('logged', mail);
                        alert("Thành công! ✅");
                        location.reload();
                    }
                });
            } else {
                alert("Mã OTP sai!");
            }
        }

        function actionLogout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
