<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AimHead</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --neon-color: #00ffcc;
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            margin-top: 20px;
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-active {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            background: transparent;
            color: var(--neon-color);
            border: 1px solid var(--neon-color);
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 5px var(--neon-color);
        }
        .btn-active:active {
            background: var(--neon-color);
            color: black;
            box-shadow: 0 0 20px var(--neon-color);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AimHead</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2 style="color: var(--neon-color); margin-top: 0;">Bảng Điều Khiển</h2>
            <p style="opacity: 0.8; font-size: 14px;">Hệ thống đã sẵn sàng kết nối.</p>
            <button class="btn-active" onclick="alert('AimHead đang chạy ngầm!')">Kích Hoạt</button>
        </div>
    </div>
</body>
</html>
