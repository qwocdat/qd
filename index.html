<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDAT SEC </title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ff88;
            --bg: #050505;
            --card: #0d0d12;
            --border: #1a1a24;
            --accent: #00b8ff;
            --danger: #ff4757;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }
        
        /* Header */
        .header { background: #000; padding: 15px 20px; border-bottom: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 18px; font-weight: bold; letter-spacing: 2px; }
        .user-info { display: flex; align-items: center; gap: 15px; font-size: 12px; }
        .balance { color: #f1c40f; font-weight: bold; font-size: 14px; }
        
        /* Layout */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        /* Menu Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 8px 15px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; white-space: nowrap; font-family: 'Orbitron', sans-serif; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); text-shadow: 0 0 8px rgba(0,255,136,0.5); }
        
        /* Khu vực hiển thị */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Lưới Sản Phẩm */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; transition: 0.3s; position: relative; overflow: hidden; }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .product-card h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; margin-bottom: 10px; color: #fff; }
        .product-card .price { color: #f1c40f; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        
        /* Buttons & Forms */
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Orbitron', sans-serif; }
        .btn-buy { background: var(--primary); color: #000; }
        .btn-buy:hover { background: #00cc6a; }
        .btn-free { background: var(--accent); color: #000; }
        
        .box-naptien { background: var(--card); border: 1px dashed var(--border); padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .form-control { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; outline: none; transition: 0.3s; font-family: 'JetBrains Mono', monospace; }
        .form-control:focus { border-color: var(--primary); }
        
        /* Modal Login */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .login-box { background: var(--card); padding: 30px; border-radius: 10px; border: 1px solid var(--primary); text-align: center; width: 300px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        .hidden { display: none !important; }
        .matrix-text { color: var(--primary); text-align: center; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:20px;">SYSTEM LOGIN</h2>
            <input type="email" id="login-email" class="form-control" placeholder="Nhập Email để lưu data..." style="margin-bottom: 15px;">
            <button class="btn btn-buy" onclick="login()">TRUY CẬP HỆ THỐNG</button>
            <p class="matrix-text">Connection secure. Encrypted via QuocDatSec.</p>
        </div>
    </div>

    <div class="header">
        <div class="logo"><i class="fas fa-terminal"></i> QD.ONLINE</div>
        <div class="user-info">
            <span id="user-display" style="color:#aaa;">Guest</span>
            <div class="balance"><i class="fas fa-wallet"></i> <span id="balance-display">0</span>đ</div>
            <button onclick="logout()" style="background:none;border:none;color:var(--danger);cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="container">
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-home', this)"><i class="fas fa-store"></i> CỬA HÀNG TOOL</button>
            <button class="tab-btn" onclick="switchTab('tab-nap', this)"><i class="fas fa-coins"></i> NẠP TIỀN AUTO</button>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="product-grid" id="product-list">
                </div>
        </div>

        <div id="tab-nap" class="tab-content">
            
            <div style="text-align:center; margin-bottom:20px;">
                <button class="tab-btn active" style="font-size:12px; padding:5px 10px;" onclick="switchNap('s-bank', this)">CHUYỂN KHOẢN (AUTO)</button>
                <button class="tab-btn" style="font-size:12px; padding:5px 10px;" onclick="switchNap('s-card', this)">NẠP THẺ CÀO</button>
            </div>

            <div id="s-bank" class="box-naptien">
                <div style="text-align:center; margin-bottom: 15px;">
                    <h3 style="color:var(--primary); font-family:'Orbitron';">AUTO BANKING 24/7</h3>
                    <p style="font-size:11px; color:#888;">Tiền tự cộng vào web sau 5-10 giây</p>
                </div>

                <div id="bank-input-area">
                    <div class="form-group">
                        <label>Số tiền muốn nạp (Tối thiểu 10k):</label>
                        <input type="number" id="bank-amount" class="form-control" placeholder="Ví dụ: 50000">
                    </div>
                    <button class="btn btn-buy" onclick="createInvoice()">TẠO MÃ THANH TOÁN QR</button>
                </div>

                <div id="invoice-area" class="hidden" style="text-align:center;">
                    <p style="font-size:12px; margin-bottom:10px; color:#aaa;">Mở App Ngân hàng quét mã này:</p>
                    <div style="background:#fff; padding:10px; display:inline-block; border-radius:8px; margin-bottom:10px;">
                        <img id="qr-generated" src="" style="width:200px;">
                    </div>
                    <div>
                        <p style="font-size:13px;">Số tiền: <b id="inv-amt" style="color:#f1c40f;">0đ</b></p>
                        <p style="font-size:13px;">Nội dung: <b id="inv-msg" style="color:var(--primary);"></b></p>
                    </div>
                    <div id="auto-listen-status" class="matrix-text" style="margin-top:15px; animation: pulse 1.5s infinite;">
                        <i class="fas fa-spinner fa-spin"></i> Hệ thống đang chờ tiền về... Không cần tải lại trang.
                    </div>
                </div>
            </div>

            <div id="s-card" class="box-naptien hidden">
                <h3 style="text-align:center; color:var(--accent); font-family:'Orbitron'; margin-bottom:15px;">NẠP THẺ CÀO</h3>
                <div class="form-group">
                    <label>Loại Thẻ</label>
                    <select id="card-type" class="form-control">
                        <option value="VIETTEL">Viettel</option>
                        <option value="VINAPHONE">Vinaphone</option>
                        <option value="MOBIFONE">Mobifone</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mệnh Giá</label>
                    <select id="card-amount" class="form-control">
                        <option value="10000">10.000đ</option>
                        <option value="20000">20.000đ</option>
                        <option value="50000">50.000đ</option>
                        <option value="100000">100.000đ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Số Seri</label>
                    <input type="text" id="card-serial" class="form-control" placeholder="Nhập Serial thẻ">
                </div>
                <div class="form-group">
                    <label>Mã Thẻ (PIN)</label>
                    <input type="text" id="card-pin" class="form-control" placeholder="Nhập Mã thẻ">
                </div>
                <button class="btn btn-buy" onclick="submitCard()">NẠP THẺ NGAY</button>
            </div>

        </div>
    </div>

    <script>
        // 1. CẤU HÌNH FIREBASE (Giữ nguyên của ông)
        const firebaseConfig = {
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let userId = null;
        let currentBalance = 0;

        // 2. KHỞI TẠO HỆ THỐNG
        window.onload = () => {
            const savedUser = localStorage.getItem('user');
            if(savedUser) {
                currentUser = savedUser;
                userId = currentUser.replace(/[.#$\[\]]/g, '_');
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('user-display').innerText = currentUser.split('@')[0];
                listenBalance();
                loadProducts();
            }
        };

        function login() {
            const email = document.getElementById('login-email').value.trim();
            if(!email || !email.includes('@')) return alert("Nhập Email hợp lệ!");
            localStorage.setItem('user', email);
            location.reload();
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        function switchNap(id, el) {
            document.getElementById('s-bank').classList.add('hidden');
            document.getElementById('s-card').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            el.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // 3. LẤY SỐ DƯ REALTIME
        function listenBalance() {
            db.ref('users/' + userId + '/balance').on('value', snap => {
                currentBalance = snap.val() || 0;
                document.getElementById('balance-display').innerText = currentBalance.toLocaleString();
                
                // Cơ chế phát hiện tiền vào tự động từ SePay/Pipedream
                if(window.isWaitingForBank && currentBalance > window.oldBalance) {
                    const received = currentBalance - window.oldBalance;
                    document.getElementById('invoice-area').innerHTML = `
                        <div style="padding: 20px; color: var(--primary);">
                            <i class="fas fa-check-circle" style="font-size: 50px; margin-bottom:15px;"></i>
                            <h3>NẠP THÀNH CÔNG +${received.toLocaleString()}đ</h3>
                        </div>
                    `;
                    window.isWaitingForBank = false;
                    setTimeout(() => location.reload(), 3000);
                }
            });
        }

        // 4. LOAD SẢN PHẨM & MUA HÀNG (Fix triệt để giá 0đ)
        function loadProducts() {
            db.ref('products').on('value', snap => {
                const list = document.getElementById('product-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    const priceText = p.price === 0 ? 'FREE' : p.price.toLocaleString() + 'đ';
                    const btnClass = p.price === 0 ? 'btn-free' : 'btn-buy';
                    const btnText = p.price === 0 ? 'NHẬN TOOL' : 'MUA NGAY';

                    list.innerHTML += `
                        <div class="product-card">
                            <h3><i class="fas fa-box-open"></i> ${p.name}</h3>
                            <div class="price">${priceText}</div>
                            <button class="btn ${btnClass}" onclick="buyItem('${child.key}', ${p.price}, '${p.link}')">${btnText}</button>
                        </div>
                    `;
                });
            });
        }

        function buyItem(key, price, link) {
            if(!link || link === "undefined") return alert("Lỗi: Admin chưa cấu hình link sản phẩm này!");
            
            if(price === 0) {
                alert("Mở khóa thành công! Đang chuyển hướng đến Link Tool...");
                window.open(link, '_blank');
                return;
            }

            if(currentBalance < price) {
                alert(`Ông còn thiếu ${(price - currentBalance).toLocaleString()}đ nữa. Vui lòng nạp thêm!`);
                switchTab('tab-nap', document.querySelectorAll('.tabs .tab-btn')[1]);
                return;
            }

            if(confirm(`Xác nhận mua với giá ${price.toLocaleString()}đ?`)) {
                db.ref('users/' + userId).update({ balance: currentBalance - price }).then(() => {
                    alert("Mua thành công! Vui lòng lưu lại link.");
                    window.open(link, '_blank');
                });
            }
        }

        // 5. AUTO BANK (SEPAY QR)
        function createInvoice() {
            const amt = document.getElementById('bank-amount').value;
            if(!amt || amt < 10000) return alert("Nạp ngân hàng tối thiểu 10.000đ ông nhé!");

            // Cú pháp nội dung: NAP + ID khách hàng
            const content = "NAP " + userId;
            
            // Link QR SePay chuẩn
            const qrUrl = `https://qr.sepay.vn/img?bank=VPBank&acc=0989249990&template=compact&amount=${amt}&des=${content}`;
            
            document.getElementById('qr-generated').src = qrUrl;
            document.getElementById('inv-amt').innerText = parseInt(amt).toLocaleString() + "đ";
            document.getElementById('inv-msg').innerText = content;
            
            document.getElementById('bank-input-area').classList.add('hidden');
            document.getElementById('invoice-area').classList.remove('hidden');

            // Bật cờ theo dõi số dư thay đổi
            window.oldBalance = currentBalance;
            window.isWaitingForBank = true;
        }

        // 6. NẠP THẺ CÀO (API Gạch thẻ)
        function submitCard() {
            const type = document.getElementById('card-type').value;
            const amount = document.getElementById('card-amount').value;
            const seri = document.getElementById('card-serial').value.trim();
            const pin = document.getElementById('card-pin').value.trim();

            if(!seri || !pin) return alert("Nhập đủ Seri và Mã Thẻ!");

            const btn = event.target;
            btn.innerText = "ĐANG XỬ LÝ...";
            btn.disabled = true;

            // LƯU Ý CHO QUỐC ĐẠT: 
            // Nếu API GachTheFast đang lỗi, code này sẽ đẩy thẳng thẻ vào Firebase để ông tự duyệt thủ công.
            // Tránh việc khách nạp bị kẹt và chửi rủa.
            db.ref('card_requests').push({
                user: currentUser,
                type: type,
                amount: amount,
                seri: seri,
                pin: pin,
                status: 'pending',
                time: new Date().toLocaleString()
            }).then(() => {
                alert("Đã gửi thẻ lên hệ thống! Vui lòng chờ Admin duyệt (1-5 phút).");
                document.getElementById('card-serial').value = '';
                document.getElementById('card-pin').value = '';
                btn.innerText = "NẠP THẺ NGAY";
                btn.disabled = false;
            }).catch(e => {
                alert("Lỗi: " + e.message);
                btn.innerText = "NẠP THẺ NGAY";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
