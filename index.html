<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Đăng Nhập • Booster Hub</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root {
      --bg: #0b0b14; --surface: rgba(20, 20, 38, 0.85); --glass-border: rgba(255, 255, 255, 0.12);
      --text: #f0f0f8; --text-secondary: #b0b0c8; --ios-blue: #0a84ff; --radius-lg: 28px;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      --shadow-glass: 0 8px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font); background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.1) 0%, transparent 60%), radial-gradient(ellipse at 50% 100%, rgba(64,156,255,0.08) 0%, transparent 60%);
      color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
      padding: max(35px, env(safe-area-inset-top)) 10px max(40px, env(safe-area-inset-bottom)); overflow: hidden;
    }
    #dustCanvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .screen { width: 100%; display: flex; justify-content: center; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .glass-panel { background: var(--surface); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1.5px solid var(--glass-border); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 380px; box-shadow: var(--shadow-glass); margin-top: 10vh; }
    .glass-panel h2 { text-align: center; margin-bottom: 20px; font-weight: 800; background: linear-gradient(135deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
    .glass-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1.5px solid var(--glass-border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s; }
    .glass-input:focus { border-color: var(--ios-blue); box-shadow: 0 0 15px rgba(10,132,255,0.3); }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #0a84ff, #005bb5); border: none; border-radius: 12px; color: #fff; font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4); transition: 0.2s; }
    .btn-primary:active { transform: scale(0.96); }
    .admin-link { text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 20px; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <canvas id="dustCanvas"></canvas>
  <div class="screen">
    <div class="glass-panel">
      <h2>HeadLockPlus</h2>
      <div class="input-group">
        <label>Nhập Key Bản Quyền:</label>
        <input type="text" id="loginKeyInput" class="glass-input" placeholder="Ví dụ: FS-XXXXXXXXX">
      </div>
      <button class="btn-primary" id="btnLogin">ĐĂNG NHẬP</button>
      <div class="admin-link" id="linkToAdmin">Quên Key?</div>
    </div>
  </div>

  <script>
    // ==========================================
    // KHỞI TẠO FIREBASE QUOC DAT
    // ==========================================
    const firebaseConfig = {
      databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Hiệu ứng bụi
    const dCanvas = document.getElementById('dustCanvas'); const dCtx = dCanvas.getContext('2d'); let particles = [];
    function resizeDust() { dCanvas.width = window.innerWidth; dCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeDust); resizeDust();
    for(let i=0; i<40; i++) particles.push({ x: Math.random() * dCanvas.width, y: Math.random() * dCanvas.height, r: Math.random() * 2 + 0.5, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, alpha: Math.random() * 0.5 + 0.1 });
    function drawDust() { dCtx.clearRect(0,0, dCanvas.width, dCanvas.height); particles.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x < 0 || p.x > dCanvas.width) p.vx *= -1; if(p.y < 0 || p.y > dCanvas.height) p.vy *= -1; dCtx.beginPath(); dCtx.arc(p.x, p.y, p.r, 0, Math.PI*2); dCtx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`; dCtx.fill(); }); requestAnimationFrame(drawDust); } drawDust();

    // Khởi tạo ID Thiết bị
    if(!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase());
    const myDeviceId = localStorage.getItem('deviceId');

    // Chuyển trang Admin
    document.getElementById('linkToAdmin').addEventListener('click', () => {
      const pw = prompt("Nhập mật khẩu Admin (mặc định: admin):");
      if(pw === 'admin') window.location.href = 'https://zalo.me/0989249990';
      else if(pw !== null) alert("Sai mật khẩu!");
    });

    // Xử lý đăng nhập bằng Firebase
    document.getElementById('btnLogin').addEventListener('click', () => {
      const inputKey = document.getElementById('loginKeyInput').value.trim();
      if(!inputKey) { alert('Vui lòng nhập Key!'); return; }
      
      document.getElementById('btnLogin').innerText = 'ĐANG KIỂM TRA...';
      
      db.ref('keys/' + inputKey).once('value', (snapshot) => {
        if(!snapshot.exists()) { 
          alert('Key không tồn tại hoặc sai!'); 
          document.getElementById('btnLogin').innerText = 'ĐĂNG NHẬP';
          return; 
        }
        
        let keyData = snapshot.val();
        
        // Kiểm tra HSD
        if(keyData.expire && Date.now() > keyData.expire) { 
          alert('Key đã hết hạn sử dụng!'); 
          document.getElementById('btnLogin').innerText = 'ĐĂNG NHẬP';
          return; 
        }
        
        // Kiểm tra thiết bị
        let devices = keyData.devices || {};
        if(!devices[myDeviceId]) {
          if(Object.keys(devices).length >= keyData.limit) {
            alert(`Key này đã đạt giới hạn tối đa ${keyData.limit} thiết bị!`); 
            document.getElementById('btnLogin').innerText = 'ĐĂNG NHẬP';
            return;
          } else {
            // Lưu thiết bị mới lên Firebase
            db.ref('keys/' + inputKey + '/devices/' + myDeviceId).set(true);
          }
        }
        
        // Đăng nhập thành công
        sessionStorage.setItem('isLoggedIn', 'true');
        window.location.href = 'hub.html';
      });
    });
  </script>
</body>
</html>
