<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUOCDAT.SEC | HỆ THỐNG XÁC THỰC</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        // Cấu hình Firebase dự án keyquocdat
        const firebaseConfig = {
          apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
          authDomain: "keyquocdat.firebaseapp.com",
          databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "keyquocdat",
          storageBucket: "keyquocdat.firebasestorage.app",
          messagingSenderId: "940819957535",
          appId: "1:940819957535:web:6e8e9a4c9838740da3122a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Khởi tạo EmailJS với Public Key của bạn
        emailjs.init("G7LvD9Rr0y1bZ7eZj");
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card-bg: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .brand { font-family: 'Orbitron'; font-size: 24px; text-align: center; margin-bottom: 30px; color: var(--primary); letter-spacing: 2px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        .input-group input { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 15px 15px 15px 45px; border-radius: 12px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div class="auth-card" id="mainCard">
        <div class="brand">QUOCDAT<span>.SEC</span></div>
        
        <div id="authFields">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Nhập Email của bạn">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu tài khoản">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-outline" onclick="handleSendOTP()">ĐĂNG KÝ (GỬI OTP)</button>
                <button class="btn btn-primary" onclick="handleLogin()">ĐĂNG NHẬP</button>
            </div>
        </div>

        <div id="otpFields" style="display: none;">
            <p style="text-align: center; color: #888; margin-bottom: 15px; font-size: 14px;">Mã OTP đã gửi vào Email của bạn</p>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="text" id="otpInput" placeholder="Nhập mã 6 chữ số">
            </div>
            <button class="btn btn-primary" onclick="handleVerifyOTP()">XÁC NHẬN & HOÀN TẤT</button>
            <button class="btn" style="background:transparent; color:#888; font-size:12px;" onclick="location.reload()">Quay lại</button>
        </div>

        <p id="statusMsg" style="color:#ff4757; font-size:13px; text-align:center; margin-top:20px; display:none;"></p>
    </div>

    <script>
        let generatedOTP = "";

        function showStatus(msg, color = "#ff4757") {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.style.color = color;
            el.style.display = 'block';
        }

        // 1. HÀM GỬI OTP
        async function handleSendOTP() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(!email.includes('@')) return showStatus("Email không hợp lệ!");
            if(pass.length < 6) return showStatus("Mật khẩu tối thiểu 6 ký tự!");

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            const params = {
                to_email: email, // KHỚP VỚI {{to_email}} trong Template
                otp_code: generatedOTP // KHỚP VỚI {{otp_code}} trong Template
            };

            showStatus("Đang gửi mã...", "#aaa");

            emailjs.send('quocdatdvmod', 'template_x4ihle9', params)
                .then(() => {
                    document.getElementById('authFields').style.display = 'none';
                    document.getElementById('otpFields').style.display = 'block';
                    showStatus("Đã gửi mã thành công!", "#00ff88");
                })
                .catch(err => {
                    showStatus("Lỗi gửi mail: " + err.text);
                });
        }

        // 2. HÀM XÁC THỰC OTP & LƯU VÀO FIREBASE
        async function handleVerifyOTP() {
            const userOTP = document.getElementById('otpInput').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if(userOTP === generatedOTP) {
                let safeUid = email.replace(/[.#$\[\]]/g, '_');
                await db.ref('users/' + safeUid).set({
                    email: email,
                    password: pass,
                    balance: 0,
                    created_at: new Date().toISOString()
                });
                alert("Đăng ký thành công!");
                localStorage.setItem('vip_username', email);
                location.href = "index.html"; // Hoặc trang chủ của bạn
            } else {
                showStatus("Mã OTP sai, vui lòng kiểm tra lại!");
            }
        }

        // 3. HÀM ĐĂNG NHẬP
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            let safeUid = email.replace(/[.#$\[\]]/g, '_');

            showStatus("Đang kiểm tra...", "#aaa");
            
            const snap = await db.ref('users/' + safeUid).once('value');
            if(snap.exists() && snap.val().password === pass) {
                localStorage.setItem('vip_username', email);
                alert("Đăng nhập thành công!");
                location.reload();
            } else {
                showStatus("Sai tài khoản hoặc mật khẩu!");
            }
        }
    </script>
</body>
</html>
