<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN PANEL | QUOCDAT SEC</title>
    
    <script>
        var isAdmin = sessionStorage.getItem('admin_logged');
        if (isAdmin !== 'true') {
            var pass = prompt("HỆ THỐNG QUẢN TRỊ\nNhập mật khẩu Admin:");
            if (pass === "ngdaiquocdat") {
                sessionStorage.setItem('admin_logged', 'true');
            } else {
                alert("Sai mật khẩu!"); window.location.href = "index.html";
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 20px; }
        .nav-item { padding: 15px; color: #888; cursor: pointer; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--card); color: var(--primary); }
        
        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box h2 { font-family: 'Orbitron'; color: var(--primary); font-size: 24px; }
        
        /* Tables */
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #555; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-top: 1px solid var(--border); font-size: 14px; }
        
        /* Buttons & Inputs */
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-edit { background: var(--accent); color: #000; }
        .btn-delete { background: #ff4757; color: #fff; margin-left: 5px; }
        .btn-add { background: var(--primary); color: #000; margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #888; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:30px;">QD.ADMIN</h2>
        <div class="nav-item active" onclick="showTab('users', this)"><i class="fas fa-users"></i> Người Dùng</div>
        <div class="nav-item" onclick="showTab('products', this)"><i class="fas fa-box"></i> Sản Phẩm</div>
        <div class="nav-item" onclick="showTab('keys', this)"><i class="fas fa-key"></i> Tạo KEY VIP</div>
        <div class="nav-item" style="margin-top:50px; color:#ff4757" onclick="location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Thoát</div>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="tab-title">Quản Lý Người Dùng</h1>
            <div id="stats-header" style="color:var(--accent)">System Online</div>
        </div>

        <div class="grid-stats">
            <div class="stat-box"><div>TỔNG USER</div><h2 id="count-users">0</h2></div>
            <div class="stat-box"><div>SẢN PHẨM</div><h2 id="count-products">0</h2></div>
            <div class="stat-box"><div>DOANH THU</div><h2 id="total-revenue">0đ</h2></div>
        </div>

        <div id="users" class="tab-content active">
            <div class="card">
                <table>
                    <thead>
                        <tr><th>Tài Khoản (Email)</th><th>Mật Khẩu</th><th>Số Dư</th><th>Thao Tác</th></tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>

        <div id="products" class="tab-content">
            <button class="btn btn-add" onclick="addProduct()">+ Thêm Sản Phẩm</button>
            <div class="card">
                <table>
                    <thead>
                        <tr><th>Tên SP</th><th>Giá</th><th>Loại</th><th>Thao Tác</th></tr>
                    </thead>
                    <tbody id="product-list"></tbody>
                </table>
            </div>
        </div>

        <div id="keys" class="tab-content">
            <div class="card" style="max-width: 500px;">
                <h3>Cấp KEY VIP Thủ Công</h3>
                <br>
                <div class="form-group">
                    <label>Chọn Sản Phẩm</label>
                    <select id="key-product-select"></select>
                </div>
                <div class="form-group">
                    <label>Mã Key (Tự chế)</label>
                    <input type="text" id="key-name" placeholder="Ví dụ: VIP-QUOCDAT-123">
                </div>
                <button class="btn btn-add" style="width:100%" onclick="generateKey()">TẠO VÀ LƯU HỆ THỐNG</button>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH FIREBASE (ĐÃ KHỚP VỚI TRANG CHỦ)
        const firebaseConfig = {
            apiKey: "AIzaSyAnZVbkcjZmVH8QC2mX6en3Rl68D2UnNTE",
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "keyquocdat"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            document.getElementById('tab-title').innerText = el.innerText;
        }

        // Lấy dữ liệu Người dùng
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            let count = 0;
            snap.forEach(user => {
                count++;
                const data = user.val();
                list.innerHTML += `
                    <tr>
                        <td style="color:var(--accent)">${data.email}</td>
                        <td>${data.password || '******'}</td>
                        <td style="color:var(--primary)">${(data.balance || 0).toLocaleString()}đ</td>
                        <td>
                            <button class="btn btn-edit" onclick="editBalance('${user.key}', ${data.balance || 0})">Sửa Tiền</button>
                            <button class="btn btn-delete" onclick="deleteUser('${user.key}')">Xóa</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('count-users').innerText = count;
        });

        // Lấy dữ liệu Sản phẩm
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list');
            const select = document.getElementById('key-product-select');
            list.innerHTML = '';
            select.innerHTML = '';
            let count = 0;
            snap.forEach(prod => {
                count++;
                const data = prod.val();
                list.innerHTML += `
                    <tr>
                        <td><b>${data.name}</b></td>
                        <td>${(data.price || 0).toLocaleString()}đ</td>
                        <td>${data.is_instant ? 'Nhận nhanh' : 'Vượt link'}</td>
                        <td><button class="btn btn-delete" onclick="deleteProduct('${prod.key}')">Xóa</button></td>
                    </tr>
                `;
                select.innerHTML += `<option value="${prod.key}">${data.name}</option>`;
            });
            document.getElementById('count-products').innerText = count;
        });

        // Các hàm chức năng
        function editBalance(id, oldBal) {
            const newBal = prompt("Nhập số dư mới cho tài khoản này:", oldBal);
            if (newBal !== null) db.ref('users/' + id).update({ balance: Number(newBal) });
        }

        function deleteUser(id) {
            if(confirm("Xóa tài khoản này?")) db.ref('users/' + id).remove();
        }

        function addProduct() {
            const name = prompt("Tên sản phẩm:");
            const price = prompt("Giá tiền:");
            const link = prompt("Link tải/Script:");
            if(name && price) {
                db.ref('products').push({ name, price: Number(price), download_link: link, is_instant: true });
            }
        }

        function deleteProduct(id) {
            if(confirm("Xóa sản phẩm này?")) db.ref('products/' + id).remove();
        }

        function generateKey() {
            const pId = document.getElementById('key-product-select').value;
            const keyName = document.getElementById('key-name').value;
            if(!keyName) return alert("Chưa nhập tên Key!");
            
            db.ref('keys').push({
                key_code: keyName,
                product_id: pId,
                status: 'unused',
                created_at: new Date().toLocaleString()
            }).then(() => {
                alert("Đã tạo Key thành công!");
                document.getElementById('key-name').value = '';
            });
        }
    </script>
</body>
</html>
