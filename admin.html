<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN PANEL | QUOCDAT SEC</title>
    
    <script>
        // Bảo mật Admin
        var isAdmin = sessionStorage.getItem('admin_logged');
        if (isAdmin !== 'true') {
            var pass = prompt("HỆ THỐNG QUẢN TRỊ\nNhập mật khẩu Admin:");
            if (pass === "ngdaiquocdat") {
                sessionStorage.setItem('admin_logged', 'true');
            } else {
                alert("Sai mật khẩu!"); window.location.href = "index.html";
            }
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0f; --card: #15151e; --border: #2a2a35; --accent: #00b8ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 20px; }
        .nav-item { padding: 15px; color: #888; cursor: pointer; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--card); color: var(--primary); }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-box h2 { font-family: 'Orbitron'; color: var(--primary); font-size: 24px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #555; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-top: 1px solid var(--border); font-size: 13px; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 12px; }
        .btn-edit { background: var(--accent); color: #000; }
        .btn-delete { background: #ff4757; color: #fff; margin-left: 5px; }
        .btn-add { background: var(--primary); color: #000; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #888; }
        .form-group input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:30px;">QD.ADMIN</h2>
        <div class="nav-item active" onclick="showTab('users', this)"><i class="fas fa-users"></i> Người Dùng</div>
        <div class="nav-item" onclick="showTab('products', this)"><i class="fas fa-box"></i> Sản Phẩm</div>
        <div class="nav-item" onclick="showTab('add-prod', this)"><i class="fas fa-plus-circle"></i> Thêm Sản Phẩm</div>
        <div class="nav-item" style="margin-top:50px; color:#ff4757" onclick="location.href='index.html'"><i class="fas fa-sign-out-alt"></i> Thoát</div>
    </div>

    <div class="main">
        <div class="header">
            <h1 id="tab-title">Quản Lý Người Dùng</h1>
            <div style="color:var(--accent)">System Secured</div>
        </div>

        <div class="grid-stats">
            <div class="stat-box"><div>TỔNG USER</div><h2 id="count-users">0</h2></div>
            <div class="stat-box"><div>SẢN PHẨM</div><h2 id="count-products">0</h2></div>
            <div class="stat-box"><div>SỐ DƯ HỆ THỐNG</div><h2 id="total-revenue">0đ</h2></div>
        </div>

        <div id="users" class="tab-content active">
            <div class="card">
                <table>
                    <thead>
                        <tr><th>Tài Khoản</th><th>Số Dư</th><th>Thao Tác</th></tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>

        <div id="products" class="tab-content">
            <div class="card">
                <table>
                    <thead>
                        <tr><th>Tên SP</th><th>Giá</th><th>Link</th><th>Thao Tác</th></tr>
                    </thead>
                    <tbody id="product-list"></tbody>
                </table>
            </div>
        </div>

        <div id="add-prod" class="tab-content">
            <div class="card" style="max-width: 500px;">
                <h3 style="margin-bottom:15px; color:var(--primary)">THÊM SẢN PHẨM MỚI</h3>
                <div class="form-group">
                    <label>Tên Sản Phẩm</label>
                    <input type="text" id="p-name" placeholder="Ví dụ: Tool Hack VIP">
                </div>
                <div class="form-group">
                    <label>Giá Tiền (VNĐ)</label>
                    <input type="number" id="p-price" placeholder="Ví dụ: 50000">
                </div>
                <div class="form-group">
                    <label>Link Tự Mở Khi Mua (Bắt buộc)</label>
                    <input type="text" id="p-link" placeholder="https://drive.google.com/...">
                </div>
                <button class="btn btn-add" style="width:100%" onclick="saveProduct()">LƯU SẢN PHẨM</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG CHUẨN ĐÉT
        const firebaseConfig = {
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            document.getElementById('tab-title').innerText = el.innerText;
        }

        // 1. Quản lý Người dùng & Tổng số dư
        db.ref('users').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            let count = 0; let totalBal = 0;
            snap.forEach(user => {
                count++;
                const data = user.val();
                totalBal += (data.balance || 0);
                list.innerHTML += `
                    <tr>
                        <td style="color:var(--accent)">${data.email}</td>
                        <td style="color:var(--primary)">${(data.balance || 0).toLocaleString()}đ</td>
                        <td>
                            <button class="btn btn-edit" onclick="editBalance('${user.key}', ${data.balance || 0})">Sửa Tiền</button>
                            <button class="btn btn-delete" onclick="deleteUser('${user.key}')">Xóa</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('count-users').innerText = count;
            document.getElementById('total-revenue').innerText = totalBal.toLocaleString() + "đ";
        });

        // 2. Danh sách Sản phẩm (Dùng biến 'link' để khớp index.html)
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            let count = 0;
            snap.forEach(prod => {
                count++;
                const data = prod.val();
                list.innerHTML += `
                    <tr>
                        <td><b>${data.name}</b></td>
                        <td>${(data.price || 0).toLocaleString()}đ</td>
                        <td style="font-size:10px; opacity:0.5">${data.link || 'Chưa gắn'}</td>
                        <td><button class="btn btn-delete" onclick="deleteProduct('${prod.key}')">Xóa</button></td>
                    </tr>
                `;
            });
            document.getElementById('count-products').innerText = count;
        });

        // 3. Hàm lưu sản phẩm chuẩn (Fix lỗi Địt cụ mày bảo chưa gắn)
        function saveProduct() {
            const n = document.getElementById('p-name').value.trim();
            const p = parseInt(document.getElementById('p-price').value);
            const l = document.getElementById('p-link').value.trim();
            
            if(!n || !p || !l) return alert("Phải nhập đủ Tên, Giá và Link mở tool!");

            db.ref('products').push({
                name: n,
                price: p,
                link: l // Tên biến 'link' này là cái index.html đang tìm
            }).then(() => {
                alert("Đã lưu sản phẩm chuẩn bài!");
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-link').value = '';
                showTab('products', document.querySelectorAll('.nav-item')[1]);
            });
        }

        function editBalance(id, oldBal) {
            const newBal = prompt("Nhập số tiền mới cho tài khoản này:", oldBal);
            if (newBal !== null) db.ref('users/' + id).update({ balance: Number(newBal) });
        }

        function deleteUser(id) { if(confirm("Xóa user này?")) db.ref('users/' + id).remove(); }
        function deleteProduct(id) { if(confirm("Xóa sản phẩm này?")) db.ref('products/' + id).remove(); }
    </script>
</body>
    </html>
