<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Verify</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 25px; padding: 30px; border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="glass">
        <h2>Xác Minh TikTok</h2>
        <p>Tải ảnh màn hình đã Follow @quocdatdv</p>
        <input type="file" id="fileInput" accept="image/*" style="margin: 20px 0;">
        <button class="btn" onclick="startVerify()">XÁC MINH NGAY</button>
        <p id="status" style="margin-top: 20px; font-weight: bold;"></p>
    </div>

    <script>
        async function startVerify() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if(!file) return alert("Chọn ảnh đã Đạt!");

            status.innerText = "⏳ Đang soi ảnh bằng OCR Space...";
            status.style.color = "yellow";

            const fd = new FormData();
            fd.append('file', file);
            fd.append('apikey', 'K85537113188957'); // Key dự phòng ổn định cho Web
            fd.append('language', 'vie');
            fd.append('OCREngine', '2');

            try {
                const res = await axios.post('https://api.ocr.space/parse/image', fd);
                const text = res.data.ParsedResults[0].ParsedText.toLowerCase();
                const keywords = ["nhắn tin", "bạn bè", "đang follow", "following", "message"];
                
                if (keywords.some(kw => text.includes(kw))) {
                    status.innerText = "✅ THÀNH CÔNG! Quay lại Zalo gõ lệnh đi.";
                    status.style.color = "#28a745";
                } else {
                    status.innerText = "❌ AI KHÔNG THẤY NÚT FOLLOW!";
                    status.style.color = "#ff4d4d";
                }
            } catch (e) {
                status.innerText = "⚠️ Lỗi API Web, hãy gửi ảnh trực tiếp cho Bot!";
            }
        }
    </script>
</body>
</html>
