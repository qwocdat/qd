<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QUOCDAT AI - NO ERROR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #res { display: none; margin-top: 20px; padding: 15px; border: 1px dashed #007AFF; color: #00ff00; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>XÁC MINH QUOCDAT AI</h2>
        <input type="file" id="f" accept="image/*">
        <button class="btn" onclick="verify()">BẮT ĐẦU QUÉT</button>
        <div id="st" style="margin-top:15px; color: yellow;"></div>
        <div id="res">Mã của mày: <b id="k"></b></div>
    </div>

    <script>
        async function verify() {
            const file = document.getElementById('f').files[0];
            const st = document.getElementById('status');
            if(!file) return alert("Chọn ảnh đã!");
            
            document.getElementById('st').innerText = "⏳ AI đang soi ID @quocdatdv...";
            try {
                const res = await Tesseract.recognize(file, 'vie+eng');
                // Xử lý chuỗi cực mạnh: Xóa khoảng trắng, chuyển về chữ thường
                const t = res.data.text.toLowerCase().replace(/\s/g, '');
                
                // Điều kiện 1: Phải có ID của mày
                // Điều kiện 2: Phải có chữ "nhắntin"
                // Điều kiện 3: KHÔNG được thấy chữ "follow" (đã mất nút đỏ)
                
                const hasID = t.includes("quocdatdv");
                const hasMsg = t.includes("nhắntin") || t.includes("message");
                const isFollowed = !t.includes("follow") || t.includes("đangfollow");

                if (hasID && hasMsg && isFollowed) {
                    const key = "qdv-" + Math.random().toString(36).substring(2, 10);
                    document.getElementById('k').innerText = key;
                    document.getElementById('res').style.display = "block";
                    document.getElementById('st').innerHTML = "<b style='color:#00ff00'>✅ THÀNH CÔNG!</b>";
                } else {
                    document.getElementById('st').innerHTML = "<b style='color:#ff4d4d'>❌ THẤT BẠI!</b><br>Hãy dùng ảnh rõ như 55239.jpg nhé.";
                }
            } catch (e) { document.getElementById('st').innerText = "⚠️ Lỗi AI quét ảnh!"; }
        }
    </script>
</body>
</html>
