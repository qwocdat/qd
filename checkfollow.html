<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --glass-bg: rgba(255, 255, 255, 0.1); }
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; font-family: -apple-system, sans-serif; color: white; }
        .glass-card { width: 90%; max-width: 360px; padding: 40px 20px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; text-align: center; }
        .upload-area { border: 2px dashed #444; padding: 25px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; }
        .btn-verify { background: var(--ios-blue); border: none; padding: 15px; width: 100%; border-radius: 15px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,122,255,0.4); }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; color: #000; z-index: 100; text-align: center; }
    </style>
</head>
<body>
    <div class="glass-card animate__animated animate__zoomIn">
        <h2 style="margin-bottom: 5px;">QuocDat AI</h2>
        <p style="opacity: 0.6; font-size: 13px;">Hệ thống xác minh TikTok @quocdatdv</p>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <span id="fileName">📁 Bấm để chọn ảnh Follow</span>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
        <button class="btn-verify" id="startVerify">XÁC MINH NGAY</button>
    </div>

    <div id="popup" class="animate__animated">
        <h3 id="popTitle" style="margin:0">Thông báo</h3>
        <p id="popMsg" style="font-size: 14px; margin: 15px 0;"></p>
        <b style="color:#007AFF; cursor:pointer;" onclick="closePopup()">ĐÃ HIỂU</b>
    </div>

    <script>
        const API_KEY = '31b09e5f-c9ca-4a93-ae2e-ca42fba90d39'; // Key của Đạt
        const fileInput = document.getElementById('fileInput');
        const startVerify = document.getElementById('startVerify');

        function showPopup(t, m, a) {
            document.getElementById('popTitle').innerText = t;
            document.getElementById('popMsg').innerText = m;
            const p = document.getElementById('popup');
            p.style.display = 'block'; p.className = 'animate__animated ' + a;
        }
        function closePopup() { document.getElementById('popup').style.display = 'none'; }

        fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('fileName').innerText = "✅ " + fileInput.files[0].name; };

        startVerify.onclick = async () => {
            if(!fileInput.files[0]) return showPopup("Lỗi", "Chưa chọn ảnh mày ơi!", "animate__shakeX");
            showPopup("AI Đang Quét", "Đang xử lý bằng Cloudmersive...", "animate__fadeIn");

            const fd = new FormData(); fd.append('imageFile', fileInput.files[0]);
            try {
                const res = await axios.post('https://api.cloudmersive.com/ocr/image/toText', fd, {
                    headers: { 'Apikey': API_KEY, 'Content-Type': 'multipart/form-data' }
                });
                const text = res.data.TextResult.toLowerCase();
                const keywords = ["nhắn tin", "bạn bè", "đang follow", "following", "message", "người follow"];
                
                if (keywords.some(kw => text.includes(kw))) {
                    showPopup("Thành Công", "AI đã xác nhận bạn đã Follow Đạt! Quay lại Zalo gõ lệnh nhé.", "animate__bounceIn");
                } else {
                    showPopup("Thất Bại", "AI không tìm thấy bằng chứng Follow. Hãy chụp rõ hơn!", "animate__shakeX");
                }
            } catch (e) { showPopup("Lỗi", "API Cloudmersive gặp sự cố!", "animate__zoomIn"); }
        };
    </script>
</body>
</html>
