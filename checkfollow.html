<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Key Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 25px; max-width: 400px; margin: auto; }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #keyDisplay { background: #222; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; border: 1px dashed #007AFF; color: #00ff00; font-family: monospace; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #007AFF;">QuocDat AI v5</h2>
        <p style="opacity: 0.7;">Quét ảnh để nhận Key VIP</p>
        <input type="file" id="file" accept="image/*" style="margin: 20px 0;">
        <button class="btn" id="btn" onclick="startVerify()">XÁC MINH & TẠO KEY</button>
        
        <div id="status"></div>
        <div id="keyDisplay">
            <p style="color: #fff; font-size: 12px;">Copy Key này về Bot Zalo:</p>
            <strong id="generatedKey"></strong>
        </div>
    </div>

    <script>
        function generateRandomKey() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = 'quocdatdv-';
            for (let i = 0; i < 9; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function startVerify() {
            const f = document.getElementById('file').files[0];
            const st = document.getElementById('status');
            const keyBox = document.getElementById('keyDisplay');
            const keyTxt = document.getElementById('generatedKey');
            
            if(!f) return alert("Chọn ảnh đi Đạt!");
            
            document.getElementById('btn').disabled = true;
            st.innerHTML = "<span style='color: #ffcc00;'>⏳ AI đang kiểm tra nút Follow...</span>";
            keyBox.style.display = "none";

            try {
                const res = await Tesseract.recognize(f, 'vie+eng');
                const text = res.data.text.toLowerCase();
                
                // Logic: Có "Nhắn tin" và KHÔNG có nút "Follow/Theo dõi" đỏ
                const hasMessage = /nhắn tin|tin nhắn|message|bạn bè|friends/.test(text);
                const stillHasFollow = /(?<!đang\s)(follow|theo dõi|theo doi)/.test(text);

                if (hasMessage && !stillHasFollow) {
                    const newKey = generateRandomKey();
                    st.innerHTML = "<b style='color:#28a745;'>✅ XÁC MINH THÀNH CÔNG!</b>";
                    keyTxt.innerText = newKey;
                    keyBox.style.display = "block";
                    
                    // Gửi key này lên server/database của mày nếu có, 
                    // hoặc đơn giản là khách chụp ảnh lại gửi cho mày check.
                } else {
                    st.innerHTML = "<b style='color:#ff4d4d;'>❌ THẤT BẠI!</b><br>AI vẫn thấy nút đỏ hoặc chưa thấy nút Nhắn tin.";
                }
            } catch (e) { st.innerText = "⚠️ Lỗi AI quét ảnh!"; }
            document.getElementById('btn').disabled = false;
        }
    </script>
</body>
</html>
