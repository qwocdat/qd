<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Web Verify</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; padding: 40px 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>QuocDat AI</h2>
        <p style="opacity: 0.7;">Hệ thống xác minh TikTok @quocdatdv</p>
        <input type="file" id="imageFile" accept="image/*" style="margin: 20px 0;">
        <button class="btn" onclick="startVerify()">XÁC MINH NGAY</button>
        <div id="status"></div>
    </div>

    <script>
        async function startVerify() {
            const file = document.getElementById('imageFile').files[0];
            const statusDiv = document.getElementById('status');
            if(!file) return alert("Chọn ảnh đã Đạt ơi!");

            statusDiv.innerText = "⏳ Đang dùng API Cloudmersive soi ảnh...";
            statusDiv.style.color = "yellow";

            const fd = new FormData();
            fd.append('imageFile', file);

            try {
                // API cực xịn mày đã đưa, không lo bị nghẽn
                const res = await axios.post('https://api.cloudmersive.com/ocr/image/toText', fd, {
                    headers: { 'Apikey': '31b09e5f-c9ca-4a93-ae2e-ca42fba90d39' }
                });

                const text = res.data.TextResult.toLowerCase();
                // Check các từ khóa quan trọng
                const keywords = ["nhắn tin", "bạn bè", "đang follow", "following", "message"];
                
                if (keywords.some(kw => text.includes(kw))) {
                    statusDiv.innerHTML = "<span style='color: #28a745;'>✅ XÁC MINH THÀNH CÔNG!</span><br>Đạt ơi, bảo khách quay lại Zalo gõ lệnh VIP ngay nhé.";
                } else {
                    statusDiv.innerText = "❌ AI không thấy nút Nhắn Tin. Hãy chụp rõ lại!";
                    statusDiv.style.color = "#ff4d4d";
                }
            } catch (e) {
                statusDiv.innerText = "⚠️ Lỗi API Cloudmersive! Hãy báo Đạt kiểm tra Key.";
            }
        }
    </script>
</body>
</html>
