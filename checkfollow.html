<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Web Verify</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 40px 20px; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>QuocDat AI</h2>
        <p>Xác minh Follow TikTok (API Server 8)</p>
        <input type="file" id="img" accept="image/*" style="margin: 20px 0;">
        <button class="btn" onclick="verify()">XÁC MINH NGAY</button>
        <p id="stt" style="margin-top:20px;"></p>
    </div>

    <script>
        async function verify() {
            const f = document.getElementById('img').files[0];
            const stt = document.getElementById('stt');
            if(!f) return alert("Chọn ảnh!");

            stt.innerText = "⏳ AI đang quét bằng Server 8...";
            stt.style.color = "yellow";

            const fd = new FormData();
            fd.append('file', f);
            fd.append('apikey', 'K85537113188957'); // API Key dự phòng cực ổn định
            fd.append('language', 'vie');
            fd.append('OCREngine', '2'); 

            try {
                // Sử dụng API8 (Server dự phòng của OCR.space, đéo bao giờ quá tải)
                const res = await axios.post('https://api8.ocr.space/parse/image', fd);
                const txt = res.data.ParsedResults[0].ParsedText.toLowerCase();
                const keys = ["nhắn tin", "bạn bè", "đang follow", "following", "message"];

                if (keys.some(k => txt.includes(k))) {
                    stt.innerHTML = "<span style='color:#28a745;'>✅ THÀNH CÔNG!</span><br>Về Zalo gõ lệnh đi Đạt.";
                } else {
                    stt.innerText = "❌ Không thấy nút Nhắn Tin!";
                    stt.style.color = "#ff4d4d";
                }
            } catch (e) {
                stt.innerText = "⚠️ Lỗi Server API mới! Thử lại sau 5s.";
            }
        }
    </script>
</body>
</html>
