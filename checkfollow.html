<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuocDat AI - Super Scan</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 25px; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(0,122,255,0.2); }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; font-size: 14px; line-height: 1.6; }
        .loading { color: #ffcc00; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #007AFF;">QuocDat AI Scan v3</h2>
        <p style="opacity: 0.7;">Quét mọi ngôn ngữ & định dạng</p>
        <input type="file" id="file" accept="image/*" style="margin: 20px 0;">
        <button class="btn" id="btn" onclick="superScan()">XÁC MINH NGAY</button>
        <div id="status"></div>
    </div>

    <script>
        async function superScan() {
            const f = document.getElementById('file').files[0];
            const st = document.getElementById('status');
            const btn = document.getElementById('btn');
            if(!f) return alert("Chọn ảnh đi Đạt!");
            
            btn.disabled = true;
            st.innerHTML = "<span class='loading'>⏳ AI đang soi từng pixel...</span>";
            
            try {
                // Chạy AI nhận diện đa ngôn ngữ
                const res = await Tesseract.recognize(f, 'vie+eng');
                // Chuyển hết về chữ thường để so sánh cho dễ
                const text = res.data.text.toLowerCase();
                
                // BỘ TỪ KHÓA TỔNG HỢP MỌI TRƯỜNG HỢP (VIỆT - ANH - HOA - THƯỜNG)
                const keywords = [
                    "nhắn tin", "nhan tin", "tin nhan", "tin nhắn",
                    "message", "msg", "mess",
                    "đang follow", "dang follow", "following", "followed",
                    "bạn bè", "ban be", "friends", "friend",
                    "đã follow", "da follow"
                ];
                
                const isMatch = keywords.some(k => text.includes(k));
                
                if (isMatch) {
                    st.innerHTML = "<b style='color:#28a745; font-size:18px;'>✅ XÁC MINH THÀNH CÔNG!</b><br>Chụp ảnh này gửi cho Đạt hoặc quay lại Zalo gõ lệnh VIP.";
                } else {
                    st.innerHTML = "<b style='color:#ff4d4d;'>❌ AI KHÔNG TÌM THẤY!</b><br>Hãy chụp rõ vùng có nút Nhắn tin hoặc Đang Follow.";
                }
            } catch (e) { 
                st.innerText = "⚠️ Lỗi AI! Thử lại ảnh khác."; 
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
