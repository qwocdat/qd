<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QUOCDAT AI - Fix 100%</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; max-width: 380px; margin: auto; }
        .btn { background: #007AFF; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #res { display: none; margin-top: 20px; padding: 15px; background: #222; border: 1px dashed #007AFF; color: #00ff00; }
    </style>
</head>
<body>
    <div class="card">
        <h2>QUOCDAT AI - XÁC MINH</h2>
        <input type="file" id="inp" accept="image/*">
        <button class="btn" onclick="verify()">QUÉT TRẠNG THÁI</button>
        <div id="st" style="margin-top:10px; color: #aaa;"></div>
        <div id="res">Mã VIP của mày: <strong id="key"></strong></div>
    </div>

    <script>
        async function verify() {
            const f = document.getElementById('inp').files[0];
            const st = document.getElementById('st');
            if(!f) return alert("Chọn ảnh đi Đạt!");
            st.innerText = "⏳ Đang lọc nhiễu & soi ID...";

            try {
                const res = await Tesseract.recognize(f, 'vie+eng');
                const t = res.data.text.toLowerCase();

                // Logic mới: Kiểm tra ID @quocdatdv và chữ Nhắn tin
                // Chỉ lấy phần văn bản phía trên (bỏ qua phần Gợi ý)
                const checkPart = t.split("đề xuất")[0]; 

                if (checkPart.includes("@quocdatdv") && (checkPart.includes("nhắn tin") || checkPart.includes("message"))) {
                    // Check xem có nút Follow đỏ của CHÍNH CHỦ không
                    if (!checkPart.includes("follow") || checkPart.includes("đang follow")) {
                        const key = "qdv-" + Math.random().toString(36).substring(2, 10);
                        document.getElementById('key').innerText = key;
                        document.getElementById('res').style.display = "block";
                        st.innerHTML = "<b style='color:#00ff00'>✅ XÁC MINH THÀNH CÔNG!</b>";
                        return;
                    }
                }
                st.innerHTML = "<b style='color:#ff4d4d'>❌ AI KHÔNG THẤY NÚT NHẮN TIN!</b><br>Hãy chụp rõ phần đầu trang cá nhân.";
            } catch(e) { st.innerText = "⚠️ Lỗi AI!"; }
        }
    </script>
</body>
</html>
