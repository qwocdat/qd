<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung S26 Privacy Demo Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-green: #34C759;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--ios-bg);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0;
        }

        /* KHUNG ĐIỆN THOẠI */
        .phone-frame {
            width: 320px; height: 500px;
            background: white;
            border: 10px solid #222;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* NỘI DUNG APP */
        .app-content {
            padding: 20px; padding-top: 50px;
            height: 100%; box-sizing: border-box;
        }

        .chat-box {
            background: #e5e5ea; padding: 12px;
            border-radius: 15px; margin-bottom: 10px; font-size: 14px;
        }

        /* LỚP CHẮN ĐEN (CHỈ TRONG ĐIỆN THOẠI) */
        #privacy-shield {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: black;
            opacity: 0; /* Mặc định trong suốt */
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 100; /* Nằm dưới Camera Preview nhưng trên nội dung */
        }

        /* CAMERA PREVIEW Ở GÓC */
        #camera-preview-container {
            position: absolute;
            top: 15px; right: 15px;
            width: 80px; height: 100px;
            border-radius: 10px;
            border: 2px solid white;
            overflow: hidden;
            z-index: 101; /* Luôn hiện để theo dõi */
            background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* BẢNG ĐIỀU KHIỂN */
        .controls {
            width: 340px; margin-top: 20px;
            background: white; padding: 15px;
            border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .row {
            display: flex; justify-content: space-between;
            align-items: center; padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        /* Switch kiểu iOS */
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--ios-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .debug-info { font-size: 11px; color: #666; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">Samsung S26 Privacy</h2>

    <div class="phone-frame">
        <div id="camera-preview-container">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div id="privacy-shield"></div>

        <div class="app-content">
            <div style="font-weight: bold; font-size: 20px; margin-bottom: 20px;">Tin nhắn riêng</div>
            <div class="chat-box"><b>Ngân hàng:</b> Số dư của bạn là 5 tỷ VNĐ.</div>
            <div class="chat-box"><b>Bạn gái:</b> Anh đang làm gì đấy?</div>
            <div class="chat-box"><b>Sếp:</b> Mai nộp báo cáo cho tôi nhé.</div>
            <img src="https://api.dicebear.com/7.x/identicon/svg?seed=Lucky" style="width: 100%; border-radius: 10px; margin-top: 10px;">
        </div>
    </div>

    <div class="controls">
        <div class="row">
            <span>Chống nhìn nghiêng (Góc > 20°)</span>
            <label class="switch">
                <input type="checkbox" id="tilt-btn">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <span>Face ID (Mất mặt = Khóa)</span>
            <label class="switch">
                <input type="checkbox" id="face-btn">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <span>Phát hiện người thứ 2</span>
            <label class="switch">
                <input type="checkbox" id="spy-btn">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row" style="border:none">
            <span>Độ tối:</span>
            <input type="range" id="dark-val" min="0.5" max="1" step="0.1" value="1">
        </div>
        
        <div class="debug-info" id="debug-text">AI: Đang tải... | Nghiêng: 0°</div>
    </div>

    <script>
        const shield = document.getElementById('privacy-shield');
        const debugText = document.getElementById('debug-text');
        const video = document.getElementById('video');
        
        const tiltBtn = document.getElementById('tilt-btn');
        const faceBtn = document.getElementById('face-btn');
        const spyBtn = document.getElementById('spy-btn');
        const darkVal = document.getElementById('dark-val');

        let isFaceMode = false;
        let isSpyMode = false;
        let isTiltMode = false;
        let currentTilt = 0;
        let faceCount = 0;

        // 1. TẢI AI
        async function loadAI() {
            try {
                // Sử dụng model siêu nhẹ từ CDN Github
                const MODEL_URL = 'https://raw.githack.com/justadudewhohacks/face-api.js/master/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                debugText.innerText = "AI: Sẵn sàng | Nghiêng: 0°";
            } catch (e) {
                debugText.innerText = "AI: Lỗi tải model!";
            }
        }

        // 2. XỬ LÝ CAMERA
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320 } });
                video.srcObject = stream;
            } catch (e) {
                alert("Lỗi camera: " + e.message);
            }
        }

        faceBtn.onchange = (e) => { 
            isFaceMode = e.target.checked; 
            if(isFaceMode || isSpyMode) startCamera();
            if(!isFaceMode && !isSpyMode && !isTiltMode) updateShield(false);
        };

        spyBtn.onchange = (e) => { 
            isSpyMode = e.target.checked; 
            if(isFaceMode || isSpyMode) startCamera();
            if(!isFaceMode && !isSpyMode && !isTiltMode) updateShield(false);
        };

        // 3. VÒNG LẶP NHẬN DIỆN (FACE ID)
        video.addEventListener('play', () => {
            setInterval(async () => {
                if (!isFaceMode && !isSpyMode) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                faceCount = detections.length;

                let faceLock = false;

                if (isFaceMode && faceCount === 0) {
                    faceLock = true; // Không có mặt = Khóa
                }
                if (isSpyMode && faceCount > 1) {
                    faceLock = true; // 2 mặt = Khóa
                }

                checkAllConditions(faceLock);
            }, 300); // Quét mỗi 0.3s
        });

        // 4. XỬ LÝ CẢM BIẾN NGHIÊNG
        tiltBtn.onchange = async (e) => {
            isTiltMode = e.target.checked;
            if (isTiltMode && typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
        };

        window.addEventListener('deviceorientation', (e) => {
            if (!isTiltMode) return;
            
            // Gamma là góc nghiêng sang trái/phải
            currentTilt = Math.abs(e.gamma || 0);
            
            let tiltLock = currentTilt > 20; // Nghiêng quá 20 độ là khóa
            checkAllConditions(tiltLock);
        });

        // HÀM TỔNG HỢP KIỂM TRA
        function checkAllConditions(cameraReason) {
            let tiltReason = isTiltMode && currentTilt > 20;
            let finalLock = cameraReason || tiltReason;

            updateShield(finalLock);
            debugText.innerText = `AI: Thấy ${faceCount} mặt | Nghiêng: ${Math.round(currentTilt)}°`;
        }

        function updateShield(isLock) {
            if (isLock) {
                shield.style.opacity = darkVal.value;
                shield.style.pointerEvents = "all";
            } else {
                shield.style.opacity = "0";
                shield.style.pointerEvents = "none";
            }
        }

        loadAI();
    </script>
</body>
</html>
