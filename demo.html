<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsung S26 Privacy Demo</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --samsung-blue: #0355d0;
            --active-green: #34C759;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Giao diện nội dung giả lập */
        .app-container {
            padding: 20px;
            filter: blur(0px);
            transition: filter 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px 20px;
        }

        .ios-card {
            background: var(--ios-card);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Màn hình chống nhìn trộm (Giống Samsung S26) */
        #privacy-shield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: black; /* Tối đen 100% */
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        /* Bảng điều khiển tùy chỉnh */
        .settings-panel {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid #DDD;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px; height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s; border-radius: 34px;
        }

        .slider:before {
            position: absolute; content: "";
            height: 22px; width: 22px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--active-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .custom-range {
            width: 100%;
            margin-top: 10px;
        }

        #status-dot {
            width: 10px; height: 10px;
            background: red; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }
    </style>
</head>
<body>

    <div id="privacy-shield"></div>

    <div class="app-container">
        <div class="header">
            <h1 style="font-size: 28px; font-weight: 700;">Tin nhắn</h1>
        </div>
        
        <div class="ios-card">
            <b style="color: var(--samsung-blue);">Ngân hàng:</b>
            <p>Số dư tài khoản của bạn là: 1,500,000,000 VND. Mã OTP là 667788.</p>
        </div>

        <div class="ios-card">
            <b>Bạn thân:</b>
            <p>Ê, tối nay đi quẩy không? Đừng cho ai nhìn thấy tin nhắn này nhé!</p>
        </div>
        
        <div style="height: 300px;"></div> </div>

    <div class="settings-panel">
        <div style="text-align: center; margin-bottom: 10px;">
            <div id="status-dot"></div> <span id="ai-log" style="font-size: 12px;">Đang tải AI...</span>
        </div>

        <div class="setting-row">
            <span>Chống nhìn nghiêng (Góc hẹp)</span>
            <label class="switch">
                <input type="checkbox" id="btn-tilt">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-row">
            <span>Face ID (Mất dấu mặt = Khóa)</span>
            <label class="switch">
                <input type="checkbox" id="btn-face">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-row">
            <span>Phát hiện nhìn lén (2 người)</span>
            <label class="switch">
                <input type="checkbox" id="btn-spy">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-row" style="flex-direction: column; align-items: flex-start;">
            <span>Độ tối màn hình che: <span id="opacity-val">100%</span></span>
            <input type="range" id="range-opacity" class="custom-range" min="0.5" max="1" step="0.1" value="1">
        </div>
    </div>

    <video id="video" autoplay muted style="display:none;"></video>

    <script>
        const shield = document.getElementById('privacy-shield');
        const aiLog = document.getElementById('ai-log');
        const statusDot = document.getElementById('status-dot');
        const video = document.getElementById('video');

        // Tùy chỉnh độ tối
        let shieldOpacity = 1;
        document.getElementById('range-opacity').addEventListener('input', (e) => {
            shieldOpacity = e.target.value;
            document.getElementById('opacity-val').innerText = (shieldOpacity * 100) + "%";
        });

        // --- CẢM BIẾN NGHIÊNG ---
        let tiltEnabled = false;
        document.getElementById('btn-tilt').addEventListener('change', async (e) => {
            tiltEnabled = e.target.checked;
            if (tiltEnabled && typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
        });

        window.addEventListener('deviceorientation', (event) => {
            if (!tiltEnabled) return;

            // Xử lý góc nghiêng hợp lý cho tư thế cầm dọc
            // Gamma: nghiêng trái/phải. Nếu quá 25 độ là che.
            const sideTilt = Math.abs(event.gamma);
            // Beta: độ dốc máy. Cầm dọc bình thường là 45-90. Nếu nằm phẳng (<20) hoặc quá đứng (>110) là che.
            const frontTilt = event.beta;

            if (sideTilt > 25 || frontTilt < 25 || frontTilt > 110) {
                activateShield();
            } else {
                if (!faceLockActive) deactivateShield();
            }
        });

        // --- FACE ID & NHÌN LÉN ---
        let faceEnabled = false;
        let spyEnabled = false;
        let faceLockActive = false;

        async function initAI() {
            try {
                // Sử dụng model siêu nhẹ từ CDN
                const MODEL_URL = 'https://raw.githack.com/justadudewhohacks/face-api.js/master/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                statusDot.style.background = "#34C759";
                aiLog.innerText = "Hệ thống bảo mật sẵn sàng";
            } catch (e) {
                aiLog.innerText = "Lỗi tải AI";
            }
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
        }

        document.getElementById('btn-face').addEventListener('change', (e) => {
            faceEnabled = e.target.checked;
            if (faceEnabled) startCamera();
        });

        document.getElementById('btn-spy').addEventListener('change', (e) => {
            spyEnabled = e.target.checked;
            if (spyEnabled) startCamera();
        });

        // Loop kiểm tra khuôn mặt
        video.addEventListener('play', () => {
            setInterval(async () => {
                if (!faceEnabled && !spyEnabled) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                
                let shouldLock = false;

                if (faceEnabled && detections.length === 0) {
                    shouldLock = true; // Không thấy mặt chủ nhân
                }
                if (spyEnabled && detections.length > 1) {
                    shouldLock = true; // Thấy người thứ 2
                    if (navigator.vibrate) navigator.vibrate(100);
                }

                if (shouldLock) {
                    faceLockActive = true;
                    activateShield();
                } else {
                    faceLockActive = false;
                    if (!tiltEnabled) deactivateShield();
                }
            }, 400);
        });

        function activateShield() {
            shield.style.opacity = shieldOpacity;
            shield.style.pointerEvents = "all";
        }

        function deactivateShield() {
            shield.style.opacity = "0";
            shield.style.pointerEvents = "none";
        }

        initAI();
    </script>
</body>
</html>
